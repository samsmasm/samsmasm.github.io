<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BusiNews &mdash; Unit Cases</title>
  <link rel="icon" type="image/jpeg" href="/unisamsq.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="page">

    <a class="back-link" href="index.html">&#8592; BusiNews</a>

    <div class="masthead">
      <div class="masthead-inner">
        <img src="/geocornsmall.png" alt="UniSam" class="masthead-seal">
        <h1>BusiNews</h1>
        <img src="/geocornsmall.png" alt="UniSam" class="masthead-seal">
      </div>
      <div class="masthead-tagline" id="unit-tagline">IB Business Management &mdash; Unit Cases</div>
    </div>

    <nav class="unit-nav">
      <a class="unit-btn" href="unit.html?n=1">Unit 1: Organisation</a>
      <a class="unit-btn" href="unit.html?n=2">Unit 2: HRM</a>
      <a class="unit-btn" href="unit.html?n=3">Unit 3: Finance</a>
      <a class="unit-btn" href="unit.html?n=4">Unit 4: Marketing</a>
      <a class="unit-btn" href="unit.html?n=5">Unit 5: Operations</a>
    </nav>

    <div id="content">
      <p class="empty-state">Loading&hellip;</p>
    </div>

    <footer>unisam.nz</footer>

  </div>

  <script>
    const PER_PAGE = 10;
    let currentPage = 0;
    let filteredCases = [];

    const UNIT_LABELS = {
      '1': 'Unit 1: Business organisation and environment',
      '2': 'Unit 2: Human resource management',
      '3': 'Unit 3: Finance and accounts',
      '4': 'Unit 4: Marketing',
      '5': 'Unit 5: Operations management',
    };

    const UNIT_NAMES = {
      '1': 'Business Organisation and Environment',
      '2': 'Human Resource Management',
      '3': 'Finance and Accounts',
      '4': 'Marketing',
      '5': 'Operations Management',
    };

    function getUnitParam() {
      return new URLSearchParams(window.location.search).get('n') || '1';
    }

    function formatDate(str) {
      const [y, m, day] = str.split('-').map(Number);
      return new Date(y, m - 1, day).toLocaleDateString('en-GB', {
        day: 'numeric', month: 'long', year: 'numeric'
      });
    }

    function tagsHTML(links) {
      if (!links || !links.length) return '';
      return links.map(l => '<span class="curriculum-tag">' + l + '</span>').join('');
    }

    function caseCardHTML(c) {
      let whatHTML = '';
      if (c.what_happened && c.what_happened.length) {
        whatHTML = '<ul class="case-card-what">'
          + c.what_happened.map(i => '<li>' + i + '</li>').join('')
          + '</ul>';
      }
      return '<div class="case-card">'
        + '<div class="case-card-meta">'
        + '<span class="case-card-date">' + formatDate(c.date) + '</span>'
        + '<div class="curriculum-tags">' + tagsHTML(c.curriculum_links) + '</div>'
        + '</div>'
        + '<h2 class="case-card-title"><a href="cases/' + c.filename + '">' + c.title + '</a></h2>'
        + '<p class="case-card-hook">' + c.hook + '</p>'
        + (c.background ? '<p class="case-card-background">' + c.background + '</p>' : '')
        + whatHTML
        + '<a class="case-card-link" href="cases/' + c.filename + '">Read the case study &rarr;</a>'
        + '</div>';
    }

    function renderPage(page) {
      const content = document.getElementById('content');
      const start = page * PER_PAGE;
      const slice = filteredCases.slice(start, start + PER_PAGE);

      if (slice.length === 0) {
        content.innerHTML = '<p class="empty-state">No case studies for this unit yet.</p>';
        return;
      }

      let html = '<div class="cases-list">'
        + slice.map(caseCardHTML).join('')
        + '</div>';

      const totalPages = Math.ceil(filteredCases.length / PER_PAGE);
      if (totalPages > 1) {
        html += '<div class="pagination">';
        if (page > 0) {
          html += '<button class="page-btn" onclick="goPage(' + (page - 1) + ')">&larr; Previous</button>';
        }
        html += '<span class="page-indicator">Page ' + (page + 1) + ' of ' + totalPages + '</span>';
        if (page < totalPages - 1) {
          html += '<button class="page-btn" onclick="goPage(' + (page + 1) + ')">Next &rarr;</button>';
        }
        html += '</div>';
      }

      content.innerHTML = html;
      window.scrollTo(0, 0);
    }

    function goPage(page) {
      currentPage = page;
      renderPage(page);
    }

    async function render() {
      const unitN = getUnitParam();
      const unitLabel = UNIT_LABELS[unitN];
      const unitName = UNIT_NAMES[unitN] || 'Unit ' + unitN;

      document.title = 'Unit ' + unitN + ': ' + unitName + ' — BusiNews';
      document.getElementById('unit-tagline').textContent = 'Unit ' + unitN + ': ' + unitName;

      // Highlight active unit button
      document.querySelectorAll('.unit-btn').forEach(btn => {
        if (btn.getAttribute('href') === 'unit.html?n=' + unitN) {
          btn.classList.add('active');
        }
      });

      const content = document.getElementById('content');
      try {
        const res = await fetch('cases.json');
        if (!res.ok) throw new Error();
        const allCases = await res.json();

        filteredCases = allCases.filter(c =>
          c.curriculum_links && c.curriculum_links.some(l => l === unitLabel)
        );

        renderPage(0);
      } catch (e) {
        content.innerHTML = '<p class="empty-state">Could not load case studies.</p>';
      }
    }

    render();
  </script>

</body>
</html>
