<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/jpeg" href="/unisamicon.jpg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Econ News — Archives</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="page">

    <a class="back-link" href="index.html">← Econ News</a>

    <div class="masthead masthead-compact">
      <div class="masthead-inner">
        <img src="/unisamicon.jpg" alt="UniSam" class="masthead-seal">
        <h1>Econ News</h1>
      </div>
      <div class="tagline-bar">Complete Archive &nbsp;·&nbsp; All Issues</div>
    </div>

    <div id="content">
      <p class="empty-state">Loading…</p>
    </div>

    <footer>
      unisam.nz
    </footer>

  </div>

  <script>
    function formatDateLong(str) {
      const [y, m, day] = str.split('-').map(Number);
      return new Date(y, m - 1, day).toLocaleDateString('en-GB', {
        weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
      });
    }

    async function render() {
      const content = document.getElementById('content');
      try {
        const res = await fetch('posts.json');
        if (!res.ok) throw new Error();
        const posts = await res.json();

        if (!Array.isArray(posts) || posts.length === 0) {
          content.innerHTML = '<p class="empty-state">No archives yet.</p>';
          return;
        }

        const count = posts.length;
        let html = '<p class="section-heading">'
          + count + ' issue' + (count !== 1 ? 's' : '')
          + '</p><div class="prev-issues-list" style="margin-bottom:0">';

        posts.forEach(post => {
          html += '<div class="archive-entry">'
            + '<span class="archive-entry-date">' + formatDateLong(post.date) + '</span>'
            + '<a class="archive-entry-link" href="posts/' + post.filename + '">View this issue →</a>'
            + '</div>';
        });

        html += '</div>';
        content.innerHTML = html;
      } catch (e) {
        content.innerHTML = '<p class="empty-state">Could not load archives.</p>';
      }
    }

    render();
  </script>

</body>
</html>
