<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Friendly Armies — Spiral Simulation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Friendly Armies</h1>

  <div id="canvas-wrap">
    <canvas id="canvas"></canvas>
  </div>

  <div id="controls">
    <!-- Playback buttons -->
    <div class="control-row">
      <button id="btn-play">&#9654; Play</button>
      <button id="btn-pause">&#9646;&#9646; Pause</button>
      <button id="btn-step">&#9654;| Step</button>
      <button id="btn-reset">&#8635; Reset</button>
      <span id="step-info">Steps: <span id="step-counter">0</span></span>
      <button id="btn-calc">&#9889; Instantly Calculate</button>
    </div>

    <!-- Progress bar -->
    <div class="control-row" id="progress-wrap">
      <span id="progress-msg">Calculating&hellip;</span>
      <div id="progress-track"><div id="progress-bar"></div></div>
    </div>

    <!-- Speed -->
    <div class="control-row">
      <label for="speed-slider">Speed:</label>
      <input type="range" id="speed-slider" min="0" max="100" value="0" class="wide-slider">
      <span class="value-badge" id="speed-label">max speed</span>
    </div>

    <!-- Factions -->
    <div class="control-row">
      <label for="faction-select">Factions:</label>
      <select id="faction-select">
        <option value="2" selected>2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6">6</option>
        <option value="7">7</option>
        <option value="8">8</option>
        <option value="9">9</option>
        <option value="10">10</option>
      </select>
    </div>

    <!-- Grid size -->
    <div class="control-row">
      <label>Grid size:</label>
      <input type="number" id="grid-w" value="200" min="10" max="1000">
      <span style="color:#888">&times;</span>
      <input type="number" id="grid-h" value="200" min="10" max="1000">
    </div>

    <!-- Unique matrices toggle -->
    <div class="control-row">
      <input type="checkbox" id="unique-toggle">
      <label for="unique-toggle">Unique movement matrix per faction</label>
    </div>
  </div>

  <!-- Faction colour pickers (always per-faction) -->
  <div id="faction-colors-section">
    <h2>Faction Colours</h2>
    <div id="faction-colors"></div>
  </div>

  <!-- Movement vector grids -->
  <div id="matrices-section">
    <h2>Movement Vectors <span class="dim">(first quadrant &rarr; auto-rotated 360&deg;)</span></h2>
    <div id="matrices"></div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
