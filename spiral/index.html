<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Friendly Armies — Spiral Simulation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Friendly Armies</h1>

  <div id="canvas-wrap">
    <canvas id="canvas"></canvas>
  </div>

  <div id="controls">
    <!-- Playback buttons -->
    <div class="control-row">
      <button id="btn-play">&#9654; Play</button>
      <button id="btn-pause">&#9646;&#9646; Pause</button>
      <button id="btn-step">&#9654;| Step</button>
      <button id="btn-reset">&#8635; Reset</button>
      <span id="step-info">Steps: <span id="step-counter">0</span></span>
      <button id="btn-calc">&#9889; Instantly Calculate</button>
    </div>

    <!-- Progress bar (shown during worker calc) -->
    <div class="control-row" id="progress-wrap">
      <span id="progress-msg">Calculating&hellip;</span>
      <div id="progress-track"><div id="progress-bar"></div></div>
    </div>

    <!-- Speed -->
    <div class="control-row">
      <label for="speed-slider">Speed (delay):</label>
      <input type="range" id="speed-slider" min="0" max="100" value="35" style="width:180px">
      <span class="value-badge" id="speed-label">50 ms</span>
    </div>

    <!-- Factions -->
    <div class="control-row">
      <label for="faction-slider">Factions:</label>
      <input type="range" id="faction-slider" min="1" max="6" value="2" style="width:120px">
      <span class="value-badge" id="faction-label">2</span>
    </div>

    <!-- Grid size -->
    <div class="control-row">
      <label>Grid size:</label>
      <input type="number" id="grid-w" value="100" min="10" max="1000">
      <span style="color:#666">×</span>
      <input type="number" id="grid-h" value="100" min="10" max="1000">
    </div>

    <!-- Unique matrices toggle -->
    <div class="control-row">
      <input type="checkbox" id="unique-toggle">
      <label for="unique-toggle">Unique piece matrices per faction</label>
    </div>
  </div>

  <!-- Faction movement designers -->
  <div id="matrices-section">
    <h2>Movement Vectors (first quadrant &rarr; auto-rotated 360&deg;)</h2>
    <div id="matrices"></div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
