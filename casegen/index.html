<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CaseGen — IB BM Surreal Finance Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background-color: #06061a;
      background-image:
        radial-gradient(ellipse at 15% 15%, rgba(124, 58, 237, 0.1) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 85%, rgba(8, 145, 178, 0.08) 0%, transparent 55%);
      min-height: 100vh;
    }

    .card { background: #0c0c22; border-radius: 14px; }
    .card-context { border: 1px solid rgba(34, 211, 238, 0.25); }
    .card-theory  { border: 1px solid rgba(168, 85, 247, 0.25); }
    .card-output  { border: 1px solid rgba(168, 85, 247, 0.2); }
    .card-result  { border: 1px solid rgba(34, 211, 238, 0.2); }

    .slot-item {
      height: 60px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 8px;
      font-size: 0.82rem; font-weight: 500;
      padding: 0 14px; text-align: center;
      color: #475569;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      transition: background 0.2s, border-color 0.2s, color 0.2s, box-shadow 0.2s;
      overflow: hidden; white-space: nowrap;
    }
    .slot-item.spinning {
      color: rgba(148,163,184,0.6);
      background: rgba(255,255,255,0.04);
      border-color: rgba(255,255,255,0.1);
    }
    .slot-item.locked-context {
      color: #22d3ee;
      background: rgba(34,211,238,0.06);
      border-color: rgba(34,211,238,0.4);
      box-shadow: 0 0 14px rgba(34,211,238,0.15), inset 0 0 10px rgba(34,211,238,0.04);
      animation: lockIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }
    .slot-item.locked-theory {
      color: #c084fc;
      background: rgba(168,85,247,0.06);
      border-color: rgba(168,85,247,0.4);
      box-shadow: 0 0 14px rgba(168,85,247,0.15), inset 0 0 10px rgba(168,85,247,0.04);
      animation: lockIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes lockIn {
      0%   { transform: scale(0.93); opacity: 0.4; }
      60%  { transform: scale(1.04); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    .spin-btn {
      background: linear-gradient(135deg, #7c3aed 0%, #0e7490 100%);
      border-radius: 100px;
      letter-spacing: 0.04em;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 20px rgba(124,58,237,0.3);
    }
    .spin-btn:hover:not(:disabled) {
      transform: scale(1.04);
      box-shadow: 0 6px 30px rgba(124,58,237,0.5), 0 0 60px rgba(8,145,178,0.2);
    }
    .spin-btn:active:not(:disabled) { transform: scale(0.96); }
    .spin-btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .spin-btn.pulsing {
      opacity: 1 !important;
      animation: spinPulse 0.7s ease-in-out infinite;
    }
    @keyframes spinPulse {
      0%,100% { box-shadow: 0 4px 20px rgba(124,58,237,0.35); }
      50%      { box-shadow: 0 4px 40px rgba(124,58,237,0.7), 0 0 80px rgba(8,145,178,0.3); }
    }

    .gen-btn {
      background: linear-gradient(135deg, #7c3aed, #a21caf);
      border-radius: 8px;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    }
    .gen-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(124,58,237,0.45);
    }
    .gen-btn:active:not(:disabled) { transform: scale(0.97); }
    .gen-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .copy-btn {
      background: linear-gradient(135deg, #059669, #0891b2);
      border-radius: 8px;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .copy-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(5,150,105,0.4); }
    .copy-btn.done  { background: linear-gradient(135deg, #047857, #065f46); }

    .results-in {
      animation: slideUp 0.45s cubic-bezier(0.22,1,0.36,1) forwards;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-table {
      border: 1px solid rgba(168,85,247,0.2);
      border-radius: 10px;
      overflow: hidden;
    }

    .prompt-area {
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(168,85,247,0.25);
      border-radius: 9px;
      color: #cbd5e1;
      font-family: ui-monospace, 'Cascadia Code', 'Fira Code', monospace;
      font-size: 0.8rem;
      line-height: 1.75;
      resize: none;
      width: 100%;
      padding: 14px 16px;
    }
    .prompt-area:focus {
      outline: none;
      border-color: rgba(168,85,247,0.5);
      box-shadow: 0 0 0 3px rgba(168,85,247,0.08);
    }

    @keyframes spin360 { to { transform: rotate(360deg); } }
    .loader {
      width: 17px; height: 17px;
      border: 2px solid rgba(168,85,247,0.2);
      border-top-color: #a855f7;
      border-radius: 50%;
      animation: spin360 0.65s linear infinite;
      flex-shrink: 0;
    }

    .glow-divider {
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(124,58,237,0.4), rgba(8,145,178,0.35), transparent);
    }
    .reel-tag {
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 700;
    }
    .dot-cyan   { box-shadow: 0 0 8px rgba(34,211,238,0.9); }
    .dot-purple { box-shadow: 0 0 8px rgba(168,85,247,0.9); }
    .dot-green  { box-shadow: 0 0 8px rgba(74,222,128,0.9); }

    /* Exam paper output */
    .exam-paper-hdr {
      background: #0d0d20;
      border-bottom: 2px solid #c9a227;
      padding: 13px 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .exam-paper-body {
      background: #fffef7;
      padding: 26px 30px 32px;
      font-family: Georgia, 'Times New Roman', serif;
      color: #16120a;
      font-size: 0.9rem;
      line-height: 1.85;
    }
    .exam-paper-body p + p { margin-top: 0.9rem; }
    .exam-paper-body strong { font-weight: 700; color: #0a0800; }
    .exam-paper-body em { font-style: italic; color: #3a2e0a; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #06061a; }
    ::-webkit-scrollbar-thumb { background: rgba(124,58,237,0.35); border-radius: 3px; }
  </style>
</head>
<body class="text-slate-300 antialiased">

  <div class="max-w-3xl mx-auto px-4 py-12">

    <!-- Header -->
    <header class="text-center mb-10">
      <div class="inline-flex items-center gap-3 mb-2">
        <div class="w-9 h-9 rounded-xl flex items-center justify-center font-black text-sm text-white"
             style="background: linear-gradient(135deg, #7c3aed, #0891b2);">CG</div>
        <h1 class="text-3xl font-extrabold tracking-tight"
            style="background: linear-gradient(90deg, #a78bfa, #f0abfc, #67e8f9); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">
          CaseGen
        </h1>
      </div>
      <p class="text-slate-500 text-sm">IB Business Management &middot; Unit 3 Finance &middot; Surreal Case Study Generator</p>
      <div class="glow-divider mt-7"></div>
    </header>

    <!-- Slot Machine -->
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-5 mb-7">

      <!-- Context Reel -->
      <div class="card card-context p-5">
        <div class="flex items-center gap-2 mb-4">
          <div class="w-2 h-2 rounded-full bg-cyan-400 dot-cyan"></div>
          <span class="reel-tag text-cyan-400">Context</span>
        </div>
        <div class="flex flex-col gap-2">
          <div id="c1" class="slot-item">&#8212;</div>
          <div id="c2" class="slot-item">&#8212;</div>
          <div id="c3" class="slot-item">&#8212;</div>
        </div>
      </div>

      <!-- Theory Reel -->
      <div class="card card-theory p-5">
        <div class="flex items-center gap-2 mb-4">
          <div class="w-2 h-2 rounded-full bg-purple-400 dot-purple"></div>
          <span class="reel-tag text-purple-400">Theory</span>
        </div>
        <div class="flex flex-col gap-2">
          <div id="t1" class="slot-item">&#8212;</div>
          <div id="t2" class="slot-item">&#8212;</div>
          <div id="t3" class="slot-item">&#8212;</div>
        </div>
      </div>

    </div>

    <!-- Spin Button -->
    <div class="flex justify-center mb-10">
      <button id="spinBtn" class="spin-btn px-11 py-4 text-white font-bold text-sm tracking-wider">
        <span id="spinLabel">&#9889; SPIN</span>
      </button>
    </div>

    <!-- Results (hidden until first spin) -->
    <div id="results" class="hidden">

      <div class="glow-divider mb-8"></div>

      <!-- Word table -->
      <div class="result-table mb-6">
        <div class="grid grid-cols-2 text-xs">
          <div class="px-5 py-3 border-b border-r border-purple-900/30 bg-cyan-950/30">
            <span class="reel-tag text-cyan-400">Context Words</span>
          </div>
          <div class="px-5 py-3 border-b border-purple-900/30 bg-purple-950/30">
            <span class="reel-tag text-purple-400">Theory Words</span>
          </div>
          <div id="ctxTable" class="px-5 py-4 border-r border-purple-900/20 space-y-2 text-sm text-cyan-100/90"></div>
          <div id="thTable"  class="px-5 py-4 space-y-2 text-sm text-purple-100/90"></div>
        </div>
      </div>

      <!-- Prompt card -->
      <div class="card card-output p-5 mb-5">
        <div class="flex items-center justify-between mb-3">
          <div class="flex items-center gap-2">
            <div class="w-2 h-2 rounded-full bg-green-400 dot-green"></div>
            <span class="reel-tag text-green-400">Prompt</span>
          </div>
          <span class="text-slate-600 text-xs">Send to any AI, or use the button below</span>
        </div>
        <textarea id="promptOut" class="prompt-area" rows="5" readonly spellcheck="false"></textarea>
        <div class="flex items-center gap-3 mt-3 flex-wrap">
          <button id="copyBtn" class="copy-btn px-5 py-2 text-white font-semibold text-xs flex items-center gap-2">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2"/>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
            <span id="copyLabel">Copy Prompt</span>
          </button>
          <button id="generateBtn" class="gen-btn px-6 py-2 text-white font-semibold text-xs flex items-center gap-2" disabled>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="5 3 19 12 5 21 5 3"/>
            </svg>
            <span id="generateLabel">Generate Case Study</span>
          </button>
        </div>
      </div>

      <!-- Output card: IB exam paper style -->
      <div id="outputCard" class="hidden mt-1" style="border-radius:10px; overflow:hidden; border:1px solid #c9a227;">

        <!-- Loading (dark, matches site) -->
        <div id="outputLoading" class="flex items-center gap-3 px-6 py-5 text-slate-500 text-sm" style="background:#0d0d20;">
          <div class="loader"></div>
          <span>Generating case study and questions...</span>
        </div>

        <!-- Exam paper -->
        <div id="outputContent" class="hidden">
          <div class="exam-paper-hdr">
            <div>
              <div style="font-size:0.58rem; letter-spacing:0.2em; text-transform:uppercase; color:#64748b; font-family:system-ui,sans-serif; font-weight:600;">IB Business Management</div>
              <div style="font-size:0.68rem; letter-spacing:0.14em; text-transform:uppercase; color:#c9a227; font-family:system-ui,sans-serif; font-weight:700; margin-top:3px;">Unit 3: Finance &mdash; Practice Paper</div>
            </div>
            <button id="copyOutputBtn" class="copy-btn px-4 py-1.5 text-white font-semibold text-xs flex items-center gap-2">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="9" y="9" width="13" height="13" rx="2"/>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
              </svg>
              <span id="copyOutputLabel">Copy</span>
            </button>
          </div>
          <div class="exam-paper-body">
            <div id="outputText"></div>
          </div>
        </div>

        <!-- Error -->
        <div id="outputError" class="hidden px-6 py-4 text-sm text-red-400" style="background:#0d0d20;"></div>

      </div>

    </div>
  </div>

  <script>
    const WORKER_URL = 'https://casegen.samgetsstuffdone.workers.dev';

    const SYSTEM_INSTRUCTION = 'You are an IB Business Management Senior Examiner. Create a 150-word case study based on the context words. Use formal business terminology and include specific financial data (e.g., price per unit, fixed costs). Draft three analytical questions (AO2/AO3) based on the theory words. Use IB Command Terms like Analyse, Evaluate, or To what extent.';

    const COOLDOWN_MS = 60000;

    const CONTEXT = [
      "Dinosaurs", "Vikings", "Robots", "Wizards", "Antarctica", "The Moon",
      "Luxury Nail Polish", "Jetpacks", "Mermaids", "Pirates", "Ninjas",
      "Time Travellers", "Underwater City", "Giant Mushrooms", "Dragon Tamers",
      "Alien Tourists", "Medieval Knights", "Cyberpunk Hackers", "Space Miners",
      "Telepathic Cats", "Ghost Detectives", "Sentient Plants", "Ice Sculptors",
      "Cloud Architects", "Memory Merchants", "Dream Weavers", "Zombie Accountants",
      "Vampire Baristas", "Werewolf Chefs", "Goblin Lawyers", "Fairy Godparents",
      "Quantum Physicists", "Interdimensional Traders", "Invisible Artists",
      "Hologram Boutique", "Brain Uploading Clinic", "Enchanted Forest Resort",
      "Lava Island Hotel", "Arctic Research Station", "Desert Nomads",
      "Underground Kingdom", "Sky Castles", "Bioluminescent Caves",
      "Coral Reef Resort", "Floating Market", "Zero-Gravity Gym",
      "Lunar Bakery", "Martian Farm", "Asteroid Mining Co.",
      "Mammoth Cloning Lab", "AI Fashion House", "Neon City Street Food",
      "Sentient Furniture Store", "Emotion Bottling Company",
      "Memory Erasing Clinic", "Teleportation Hub", "Anti-Gravity Sports League",
      "Bespoke Potion Shop", "Enchanted Bookshop", "Cyborg Athletes",
      "Mermaid Spa", "Unicorn Ranch", "Dragon Egg Auction House",
      "Crystal Ball Consultancy", "Wormhole Travel Agency",
      "Steampunk Airship Company", "Neon Jellyfish Farm", "Space Tourism Agency",
      "Underground Mushroom Market", "Robot Therapy Centre", "Alien Streetwear Brand",
      "Holographic Museum", "Sentient Coffee Shop", "Deep Sea Restaurant",
      "Orbital Hotel", "Mars Colony Café", "Cybernetic Tailor",
      "Enchanted Toy Factory", "Volcanic Winery", "Submarine Food Truck",
      "Sentient Library", "Ghost Town Real Estate", "Dragon Racing Circuit",
      "Underwater Hockey League", "Immortality Spa", "Anti-Ageing Potion Brand",
      "Telekinesis Training Academy", "Galactic Farmers Market",
      "Synthetic Emotion Studio", "Plague Doctor Collective",
      "Bio-engineered Pets Boutique", "Time Capsule Storage",
      "Invisible Architecture Firm", "Cybernetic Fashion Show",
      "Giant Spider Silk Mill", "Enchanted Mirror Gallery",
      "Psychic Stock Exchange", "Interdimensional Post Office",
      "Cloud City Café", "Dinosaur Safari Park"
    ];

    const THEORY = [
      "Internal Finance", "External Finance", "Personal Funds", "Retained Profit",
      "Sale of Assets", "Share Capital", "Loan Capital", "Overdrafts",
      "Trade Credit", "Grants", "Subsidies", "Debt Factoring",
      "Leasing", "Venture Capital", "Business Angels", "Crowdfunding",
      "IPO", "Rights Issue", "Capital Expenditure", "Revenue Expenditure",
      "Fixed Costs", "Variable Costs", "Semi-variable Costs", "Direct Costs",
      "Indirect Costs", "Overheads", "Total Cost", "Average Cost",
      "Revenue", "Revenue Stream", "Total Revenue", "Sales Volume",
      "Break-even Point", "Short Run", "Long Run", "Contribution per Unit",
      "Total Contribution", "Margin of Safety", "Break-even Chart",
      "Break-even Quantity", "Target Profit Output", "Target Profit Price",
      "Break-even Analysis", "Profit", "Loss", "CVP Analysis",
      "Safety Buffer", "Linearity Assumption", "Price Elasticity of Demand",
      "Unit Contribution"
    ];

    let spinning = false;
    let generating = false;
    let cooldownTimer = null;
    let ctx = [], th = [];
    let lastOutputRaw = '';

    function pickUnique(arr, n) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy.slice(0, n);
    }

    function animateReel(id, pool, finalWord, lockClass, startDelay) {
      return new Promise(resolve => {
        setTimeout(() => {
          const el = document.getElementById(id);
          el.className = 'slot-item spinning';
          const totalMs = 1800, minInterval = 55, maxInterval = 380;
          let elapsed = 0;
          function tick() {
            el.textContent = pool[Math.floor(Math.random() * pool.length)];
            const eased = Math.min(elapsed / totalMs, 1) ** 2;
            const interval = minInterval + (maxInterval - minInterval) * eased;
            elapsed += interval;
            if (elapsed >= totalMs) {
              el.textContent = finalWord;
              el.className = 'slot-item ' + lockClass;
              resolve();
            } else {
              setTimeout(tick, interval);
            }
          }
          tick();
        }, startDelay);
      });
    }

    function buildPrompt(c, t) {
      return `Use ${c[0]}, ${c[1]}, and ${c[2]} to create a business case study of approximately 150 words for IB Business Management students. Then, create three questions based on ${t[0]}, ${t[1]}, and ${t[2]}. Make sure that the context gives enough relevant information to answer these questions. These should be analytical or evaluative questions (roughly 6 marks in depth), not simple definition or essay-style questions.`;
    }

    function startCooldown() {
      const btn = document.getElementById('spinBtn');
      btn.disabled = true;
      const end = Date.now() + COOLDOWN_MS;
      cooldownTimer = setInterval(() => {
        if (spinning) return; // don't overwrite "SPINNING..." during animation
        const remaining = Math.ceil((end - Date.now()) / 1000);
        if (remaining <= 0) {
          clearInterval(cooldownTimer);
          cooldownTimer = null;
          btn.disabled = false;
          document.getElementById('spinLabel').textContent = '⚡ SPIN';
        } else {
          document.getElementById('spinLabel').textContent = `⏳ ${remaining}s`;
        }
      }, 200);
    }

    function renderMarkdown(raw) {
      const esc = raw
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
      return '<p>' + esc
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*([^*\n]+)\*/g, '<em>$1</em>')
        .replace(/\n\n+/g, '</p><p>')
        .replace(/\n/g, '<br>') + '</p>';
    }

    async function generate() {
      if (generating) return;
      generating = true;

      const genBtn        = document.getElementById('generateBtn');
      const genLabel      = document.getElementById('generateLabel');
      const outputCard    = document.getElementById('outputCard');
      const outputLoading = document.getElementById('outputLoading');
      const outputContent = document.getElementById('outputContent');
      const outputError   = document.getElementById('outputError');

      genBtn.disabled = true;
      genLabel.textContent = 'Generating...';

      outputCard.classList.remove('hidden');
      outputLoading.classList.remove('hidden');
      outputContent.classList.add('hidden');
      outputError.classList.add('hidden');

      try {
        const response = await fetch(WORKER_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            prompt: document.getElementById('promptOut').value,
            systemInstruction: SYSTEM_INSTRUCTION
          })
        });

        if (!response.ok) throw new Error(`Worker returned ${response.status}`);

        const data = await response.json();
        const text = data?.candidates?.[0]?.content?.parts?.[0]?.text;
        if (!text) throw new Error('Unexpected response format.');

        lastOutputRaw = text;
        document.getElementById('outputText').innerHTML = renderMarkdown(text);
        outputLoading.classList.add('hidden');
        outputContent.classList.remove('hidden');

      } catch (err) {
        outputLoading.classList.add('hidden');
        outputError.classList.remove('hidden');
        outputError.textContent = `Error: ${err.message}`;
      }

      genBtn.disabled = false;
      genLabel.textContent = 'Regenerate';
      generating = false;
    }

    async function spin() {
      if (spinning || cooldownTimer) return;
      spinning = true;

      const spinBtn = document.getElementById('spinBtn');
      const spinLabel = document.getElementById('spinLabel');
      const results = document.getElementById('results');
      const genBtn = document.getElementById('generateBtn');

      spinBtn.classList.add('pulsing');
      spinLabel.textContent = '⚡ SPINNING...';
      genBtn.disabled = true;
      document.getElementById('generateLabel').textContent = 'Generate Case Study';

      startCooldown(); // 60s starts the moment Spin is clicked

      results.classList.add('hidden');
      document.getElementById('outputCard').classList.add('hidden');

      ['c1','c2','c3','t1','t2','t3'].forEach(id => {
        const el = document.getElementById(id);
        el.className = 'slot-item';
        el.textContent = '—';
      });

      ctx = pickUnique(CONTEXT, 3);
      th  = pickUnique(THEORY, 3);

      await Promise.all([
        animateReel('c1', CONTEXT, ctx[0], 'locked-context', 0),
        animateReel('c2', CONTEXT, ctx[1], 'locked-context', 180),
        animateReel('c3', CONTEXT, ctx[2], 'locked-context', 360),
        animateReel('t1', THEORY,  th[0],  'locked-theory',  90),
        animateReel('t2', THEORY,  th[1],  'locked-theory',  270),
        animateReel('t3', THEORY,  th[2],  'locked-theory',  450),
      ]);

      document.getElementById('ctxTable').innerHTML =
        ctx.map((w, i) => `<div class="flex gap-2"><span class="text-cyan-700 font-mono text-xs mt-px">${i+1}.</span><span>${w}</span></div>`).join('');
      document.getElementById('thTable').innerHTML =
        th.map((w, i) => `<div class="flex gap-2"><span class="text-purple-700 font-mono text-xs mt-px">${i+1}.</span><span>${w}</span></div>`).join('');

      document.getElementById('promptOut').value = buildPrompt(ctx, th);

      results.classList.remove('hidden');
      results.classList.remove('results-in');
      void results.offsetWidth;
      results.classList.add('results-in');

      spinBtn.classList.remove('pulsing');
      spinning = false; // countdown label kicks in on next timer tick

      genBtn.disabled = false;
    }

    document.getElementById('spinBtn').addEventListener('click', spin);
    document.getElementById('generateBtn').addEventListener('click', generate);

    document.getElementById('copyBtn').addEventListener('click', function () {
      const text = document.getElementById('promptOut').value;
      if (!text) return;
      const lbl = document.getElementById('copyLabel');
      navigator.clipboard.writeText(text).then(() => {
        this.classList.add('done'); lbl.textContent = 'Copied!';
        setTimeout(() => { this.classList.remove('done'); lbl.textContent = 'Copy Prompt'; }, 2000);
      }).catch(() => {
        document.getElementById('promptOut').select();
        document.execCommand('copy');
        this.classList.add('done'); lbl.textContent = 'Copied!';
        setTimeout(() => { this.classList.remove('done'); lbl.textContent = 'Copy Prompt'; }, 2000);
      });
    });

    document.getElementById('copyOutputBtn').addEventListener('click', function () {
      if (!lastOutputRaw) return;
      const lbl = document.getElementById('copyOutputLabel');
      navigator.clipboard.writeText(lastOutputRaw).then(() => {
        this.classList.add('done'); lbl.textContent = 'Copied!';
        setTimeout(() => { this.classList.remove('done'); lbl.textContent = 'Copy'; }, 2000);
      }).catch(() => {
        this.classList.add('done'); lbl.textContent = 'Copied!';
        setTimeout(() => { this.classList.remove('done'); lbl.textContent = 'Copy'; }, 2000);
      });
    });
  </script>

</body>
</html>
