<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MOA – 🎧 Gibbons</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../retro.css">
  <link rel="icon" href="/moa/moafav.png">
  <style>
    .player-wrap {
      max-width: 520px;
      margin: 0 auto;
    }

    .page-heading {
      text-align: center;
      font-family: 'Arial Black', Arial, sans-serif;
      font-size: 22px;
      color: var(--purple);
      margin-bottom: 16px;
      text-shadow: 1px 1px 0 #ccc;
    }

    .album-frame {
      border: 6px inset #555;
      background: #000;
      line-height: 0;
      margin-bottom: 0;
    }

    .album-art {
      width: 100%;
      display: block;
    }

    .retro-player {
      background: #c0c0c0;
      border: 3px outset #e8e8e8;
      padding: 10px 12px 12px;
    }

    .player-header {
      background: #000080;
      color: #fff;
      font-family: Arial, sans-serif;
      font-size: 10px;
      font-weight: bold;
      padding: 2px 6px;
      letter-spacing: 0.15em;
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .player-lcd {
      background: #1a2e0a;
      border: 3px inset #888;
      padding: 8px 10px;
      margin-bottom: 8px;
    }

    .lcd-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }

    .lcd-title {
      color: #4dff00;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      font-weight: bold;
      letter-spacing: 0.1em;
      text-shadow: 0 0 5px #4dff00;
    }

    .lcd-time {
      color: #33bb00;
      font-size: 11px;
      font-family: 'Courier New', monospace;
      white-space: nowrap;
      text-shadow: 0 0 3px #33bb00;
    }

    .vu-container {
      display: flex;
      gap: 3px;
      align-items: flex-end;
      height: 20px;
    }

    .vu-bar {
      flex: 1;
      background: #0a5500;
      height: 4px;
      transition: height 0.1s steps(5);
    }

    .vu-bar.peak { background: #ff4400; }

    .progress-bar {
      background: #1a2e0a;
      border: 2px inset #888;
      height: 14px;
      cursor: pointer;
      overflow: hidden;
    }

    .progress-fill {
      background: #4dff00;
      height: 100%;
      width: 0%;
      box-shadow: 0 0 4px #4dff00;
    }

    .player-controls {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin: 8px 0;
    }

    .ctrl-btn {
      background: #d4d0c8;
      border: 2px outset #f0ede8;
      border-bottom-color: #888;
      border-right-color: #888;
      padding: 5px 12px;
      font-size: 15px;
      cursor: pointer;
      min-width: 42px;
      color: #111;
      font-family: 'Courier New', monospace;
      font-weight: bold;
    }

    .ctrl-btn:active { border-style: inset; }
    .ctrl-btn:hover:not(:active) { background: #e8e4dc; }
    .ctrl-btn.active-btn { background: #00cc30; color: #001a00; border-color: #009920; }

    .volume-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }

    .volume-row label {
      font-size: 10px;
      font-weight: bold;
      text-transform: uppercase;
      color: #555;
      font-family: Arial, sans-serif;
      letter-spacing: 0.1em;
    }

    .volume-row input[type=range] {
      flex: 1;
      accent-color: #009920;
    }

    .player-status {
      text-align: center;
      font-size: 10px;
      color: #555;
      font-family: Arial, sans-serif;
      margin-top: 8px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }
  </style>
</head>
<body>
<div class="taskbar">
  <span>MOA: Modern Origin Archive</span>
  <a class="taskbar-link" href="https://sites.google.com/ssis.edu.vn/library/library?authuser=2" target="_blank" rel="noopener">SSIS Library</a>
  <span class="taskbar-clock" id="taskbar-clock">00:00</span>
</div>

<div class="marquee-bar">
  <marquee>🎧 GIBBONS &nbsp;&nbsp;&bull;&nbsp;&nbsp; MOA: MODERN ORIGIN ARCHIVE &nbsp;&nbsp;&bull;&nbsp;&nbsp; PRESS PLAY &nbsp;&nbsp;&bull;&nbsp;&nbsp; ★ DO IT ★ &nbsp;&nbsp;&bull;&nbsp;&nbsp;</marquee>
</div>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-window">
      <div class="sidebar-titlebar">
        <span>MOA</span>
        <div class="titlebar-buttons">
          <div class="titlebar-btn">_</div>
          <div class="titlebar-btn">□</div>
          <div class="titlebar-btn">✕</div>
        </div>
      </div>
      <div class="sidebar-logo">
        <div class="site-title">MOA</div>
        <div class="site-sub">Modern Origin Archive</div>
      </div>
      <nav id="main-nav"></nav>
    </div>
  </aside>

  <div class="main-window">
    <div class="main-titlebar">
      <div class="titlebar-icon">🎧</div>
      <span>Gibbons – MOA Audio Player</span>
      <div class="titlebar-buttons">
        <div class="titlebar-btn">_</div>
        <div class="titlebar-btn">□</div>
        <div class="titlebar-btn">✕</div>
      </div>
    </div>

    <div class="tab-panel active" style="padding: 20px 24px;">
      <div class="player-wrap">
        <p class="page-heading">🎧 GIBBONS.M4A 🎧</p>

        <div class="album-frame">
          <img class="album-art" src="../gibbons.webp" alt="Gibbons">
        </div>

        <div class="retro-player">
          <div class="player-header">
            <span>MOA MEDIA PLAYER v1.0</span>
            <span>★ WEB EDITION ★</span>
          </div>

          <div class="player-lcd">
            <div class="lcd-row">
              <span class="lcd-title" id="lcd-title">GIBBONS.M4A</span>
              <span class="lcd-time" id="lcd-time">0:00 / 0:00</span>
            </div>
            <div class="vu-container" id="vu-container"></div>
          </div>

          <div class="progress-bar" id="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
          </div>

          <div class="player-controls">
            <button class="ctrl-btn" id="btn-play" title="Play / Pause">▶</button>
            <button class="ctrl-btn" id="btn-stop" title="Stop">■</button>
            <button class="ctrl-btn" id="btn-loop" title="Loop">↺</button>
          </div>

          <div class="volume-row">
            <label>VOL</label>
            <input type="range" id="vol-slider" min="0" max="1" step="0.05" value="1">
          </div>

          <div class="player-status" id="player-status">STOPPED</div>
        </div>
      </div>

      <audio id="audio-player" src="../gibbons.m4a" preload="metadata"></audio>
    </div>
  </div>
</div>

<div class="page-footer"></div>

<script src="../nav.js"></script>
<script>
(function () {
  const audio        = document.getElementById('audio-player');
  const btnPlay      = document.getElementById('btn-play');
  const btnStop      = document.getElementById('btn-stop');
  const btnLoop      = document.getElementById('btn-loop');
  const lcdTitle     = document.getElementById('lcd-title');
  const lcdTime      = document.getElementById('lcd-time');
  const progressFill = document.getElementById('progress-fill');
  const progressBar  = document.getElementById('progress-bar');
  const volSlider    = document.getElementById('vol-slider');
  const statusEl     = document.getElementById('player-status');
  const vuContainer  = document.getElementById('vu-container');

  /* build VU bars */
  const N_BARS = 16;
  const bars = Array.from({ length: N_BARS }, () => {
    const b = document.createElement('div');
    b.className = 'vu-bar';
    vuContainer.appendChild(b);
    return b;
  });

  function fmt(t) {
    if (!t || isNaN(t)) return '0:00';
    return Math.floor(t / 60) + ':' + Math.floor(t % 60).toString().padStart(2, '0');
  }

  /* scrolling LCD title */
  const TITLE = 'GIBBONS.M4A  ★  ';
  let titlePos = 0;
  setInterval(() => {
    const s = TITLE + TITLE;
    lcdTitle.textContent = s.substring(titlePos, titlePos + 18);
    titlePos = (titlePos + 1) % TITLE.length;
  }, 200);

  /* VU animation */
  let vuVals = bars.map(() => 4);
  setInterval(() => {
    const playing = !audio.paused && !audio.ended;
    bars.forEach((b, i) => {
      let target;
      if (playing) {
        const centre = Math.abs(i - N_BARS / 2) / (N_BARS / 2);
        target = Math.max(8, (1 - centre * 0.5) * 100 * (0.4 + Math.random() * 0.6));
      } else {
        target = Math.max(4, vuVals[i] * 0.6);
      }
      vuVals[i] = target;
      b.style.height = Math.round(target) + '%';
      b.classList.toggle('peak', target > 85);
    });
  }, 100);

  function updateTime() {
    lcdTime.textContent = fmt(audio.currentTime) + ' / ' + fmt(audio.duration);
    progressFill.style.width =
      (audio.duration ? (audio.currentTime / audio.duration) * 100 : 0) + '%';
  }

  btnPlay.addEventListener('click', () => {
    if (audio.paused || audio.ended) {
      audio.play();
      btnPlay.textContent = '⏸';
      btnPlay.classList.add('active-btn');
      statusEl.textContent = 'PLAYING';
    } else {
      audio.pause();
      btnPlay.textContent = '▶';
      btnPlay.classList.remove('active-btn');
      statusEl.textContent = 'PAUSED';
    }
  });

  btnStop.addEventListener('click', () => {
    audio.pause();
    audio.currentTime = 0;
    btnPlay.textContent = '▶';
    btnPlay.classList.remove('active-btn');
    statusEl.textContent = 'STOPPED';
    progressFill.style.width = '0%';
    lcdTime.textContent = '0:00 / ' + fmt(audio.duration);
  });

  let looping = false;
  btnLoop.addEventListener('click', () => {
    looping = !looping;
    audio.loop = looping;
    btnLoop.classList.toggle('active-btn', looping);
    statusEl.textContent = looping ? 'LOOP ON' : 'LOOP OFF';
  });

  audio.addEventListener('timeupdate', updateTime);
  audio.addEventListener('loadedmetadata', updateTime);
  audio.addEventListener('ended', () => {
    if (!looping) {
      btnPlay.textContent = '▶';
      btnPlay.classList.remove('active-btn');
      statusEl.textContent = 'FINISHED';
    }
  });

  progressBar.addEventListener('click', e => {
    if (!audio.duration) return;
    const r = progressBar.getBoundingClientRect();
    audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
  });

  volSlider.addEventListener('input', () => {
    audio.volume = parseFloat(volSlider.value);
  });
}());
</script>
</body>
</html>
