<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="/unisamicon2.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spectra</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

<!-- ===================== LANDING ===================== -->
<div id="view-landing" class="view active">
    <div class="brand">SPECTRA</div>
    <p class="brand-sub">Rate statements. See the spectrum of opinion.</p>
    <div class="landing-btns">
        <button class="landing-btn" id="btn-im-teacher">I'm a Teacher</button>
        <button class="landing-btn secondary" id="btn-im-student">I'm a Student</button>
    </div>
    <div class="student-room-entry hidden" id="student-room-entry">
        <div class="field-group">
            <label>Room Name</label>
            <input type="text" id="landing-room-input" placeholder="e.g. PHIL101" autocomplete="off">
        </div>
        <button class="btn primary" id="btn-student-go">Join Room</button>
    </div>
</div>

<!-- ===================== TEACHER SETUP ===================== -->
<div id="view-teacher-setup" class="view">
    <div class="setup-header">
        <span class="brand-sm">SPECTRA</span>
        <button class="btn-back" id="btn-back-setup">&#8592; Back</button>
    </div>
    <div class="setup-cols">

        <div class="setup-col">
            <div class="col-heading new-heading">Create New Room</div>
            <div class="card">
                <div class="field-group">
                    <label>Room Name</label>
                    <input type="text" id="new-room-input" placeholder="e.g. PHIL101" autocomplete="off">
                </div>
                <div class="field-group">
                    <label>PIN</label>
                    <input type="password" id="new-pin-input" placeholder="e.g. 1234" maxlength="8" autocomplete="new-password">
                </div>
                <div class="field-group">
                    <label>Statements</label>
                    <div class="format-hint">One statement per blank line, category in square brackets:</div>
                    <div class="format-example"><em>Homework should be banned. [Education]</em></div>
                    <textarea id="statements-input" placeholder="Homework should be banned. [Education]

Social media does more harm than good. [Technology]

Climate change is the defining issue of our time. [Environment]" rows="9"></textarea>
                </div>
                <div class="field-row">
                    <div class="field-group half">
                        <label>Scale Min</label>
                        <input type="number" id="scale-min-input" value="0">
                    </div>
                    <div class="field-group half">
                        <label>Scale Max</label>
                        <input type="number" id="scale-max-input" value="100">
                    </div>
                </div>
                <label class="toggle-label">
                    <input type="checkbox" id="shuffle-toggle" checked>
                    <span>Shuffle statement order</span>
                </label>
                <label class="toggle-label">
                    <input type="checkbox" id="require-name-toggle">
                    <span>Require student names</span>
                </label>
                <button class="btn primary" id="btn-start-session">Start Session</button>
                <div class="error-msg hidden" id="create-error"></div>
            </div>
        </div>

        <div class="col-divider"></div>

        <div class="setup-col rejoin-col">
            <div class="col-heading rejoin-heading">Rejoin Old Room</div>
            <div class="card">
                <div class="field-group">
                    <label>Room Name</label>
                    <input type="text" id="rejoin-room-input" placeholder="e.g. PHIL101" autocomplete="off">
                </div>
                <div class="field-group">
                    <label>PIN</label>
                    <input type="password" id="rejoin-pin-input" placeholder="e.g. 1234" maxlength="8" autocomplete="new-password">
                </div>
                <button class="btn rejoin-btn" id="btn-rejoin">Rejoin</button>
                <div class="error-msg hidden" id="rejoin-error"></div>
            </div>
        </div>

    </div>
</div>

<!-- ===================== TEACHER DASHBOARD ===================== -->
<div id="view-teacher-dashboard" class="view">
    <div class="teacher-bar">
        <div class="bar-left">
            <span class="brand-sm">SPECTRA</span>
            <span class="room-tag" id="t-room-label"></span>
            <span class="count-tag" id="t-count">0 responses</span>
        </div>
        <div class="bar-right">
            <div class="mode-btns">
                <button class="btn-mode active" data-mode="random">Random</button>
                <button class="btn-mode" data-mode="organise">Organise</button>
                <button class="btn-mode" data-mode="reveal">Reveal</button>
                <button class="btn-mode" data-mode="table">Table</button>
            </div>
            <button class="btn-ctrl" id="btn-t-leave">Leave</button>
        </div>
    </div>
    <div class="dashboard-content">
        <div class="results-panel" id="results-panel">
            <div class="empty-state">Waiting for responses...</div>
        </div>
        <div class="access-panel">
            <div class="qr-wrap" id="qrcode"></div>
            <div class="join-link" id="join-link-text"></div>
            <div class="pin-display">PIN: <span id="pin-display-val">—</span></div>
            <div class="access-count" id="access-count">0 responses</div>
        </div>
    </div>
</div>

<!-- ===================== STUDENT SLIDERS ===================== -->
<div id="view-student-sliders" class="view">
    <div class="student-inner wide">
        <div class="brand-sm-center">SPECTRA</div>
        <div class="room-label" id="s-sliders-room-label"></div>
        <div class="error-msg hidden" id="student-load-error"></div>
        <div id="sliders-container"></div>
        <div class="name-input-wrap hidden" id="name-input-wrap">
            <div class="field-group">
                <label>Your Name</label>
                <input type="text" id="student-name-input" placeholder="Enter your name" autocomplete="name">
            </div>
        </div>
        <div class="submit-bar hidden" id="submit-bar">
            <button class="btn primary large" id="btn-submit-responses">Submit Responses</button>
        </div>
        <div class="done-message hidden" id="done-message">
            <div class="done-icon">&#10003;</div>
            <p>Thanks for sharing!</p>
            <button class="btn-link" id="btn-change-responses">Change responses</button>
        </div>
    </div>
</div>

<!-- Tooltip for dot hover names -->
<div class="dot-tooltip hidden" id="dot-tooltip"></div>

<script type="module" src="script.js"></script>
</body>
</html>
