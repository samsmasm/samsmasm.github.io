name: Question Mark scoring

on:
  schedule:
    - cron: '0 8 * * 0'   # Sunday 08:00 UTC
  workflow_dispatch:       # allow manual trigger from GitHub UI

jobs:
  score:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install feedparser anthropic

      - name: Score candidate stories
        run: python questionmark_scripts/score_stories.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Generate case study
        run: python questionmark_scripts/generate_cases.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add questionmark/candidate_stories.json questionmark/case_study.json
          git diff --cached --quiet || git commit -m "questionmark: $(date +%Y-%m-%d)"
          git push
