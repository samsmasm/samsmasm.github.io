name: Talkonomics quiz update

on:
  schedule:
    - cron: '0 8 * * 0'   # Sunday 08:00 UTC (Sunday evening NZT)
  workflow_dispatch:       # allow manual trigger from GitHub UI

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install feedparser anthropic

      - name: Generate quiz
        run: python quiz_scripts/quiz_generate.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add quiz/
          git diff --cached --quiet || git commit -m "talkonomics: $(date +%Y-%m-%d)"
          git pull --rebase
          git push
