name: EconNews update

on:
  schedule:
    - cron: '0 7 * * 0'   # Sunday 07:00 UTC
  workflow_dispatch:       # allow manual trigger from GitHub UI

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install feedparser anthropic beautifulsoup4

      - name: Generate EconNews post
        run: python econnews_scripts/econnews_update.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Update posts index and feeds
        run: |
          python econnews_scripts/econnews_posts.py
          python generate-feeds.py

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add econnews/ quiz/feed.json businews/feed.json
          git diff --cached --quiet || git commit -m "econnews: $(date +%Y-%m-%d)"
          git push
