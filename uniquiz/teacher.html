<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard – UniQuiz</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="auth-overlay" class="hidden">
    <div class="auth-box">
      <div class="logo" style="font-size:1.8rem; margin-bottom: 1rem;">UniQuiz</div>
      <h2>Teacher Login</h2>
      <p class="sub mt-1">Enter your password to access the dashboard.<br>
        <span class="text-xs">First visit? Your first entry sets the password.</span>
      </p>
      <form id="auth-form" class="flex-col gap-sm mt-2">
        <input type="password" id="auth-password" placeholder="Password">
        <button type="submit" id="auth-submit" class="btn btn-primary btn-full">Enter</button>
      </form>
      <p id="auth-error" class="msg msg-error mt-1" style="min-height:1.4em;"></p>
    </div>
  </div>

  <div id="main-content" class="hidden">
    <header class="header">
      <span class="logo">UniQuiz</span>
      <div class="flex gap-sm">
        <a href="create.html" class="btn btn-primary">+ New Quiz</a>
        <button id="logout-btn" class="btn btn-ghost btn-sm">Logout</button>
      </div>
    </header>

    <div class="page mt-2">
      <h2 class="mb-2">My Quizzes</h2>

      <div id="quiz-list">
        <div class="text-center text-muted mt-3">
          <div class="spinner mb-2"></div>
          <p>Loading quizzes…</p>
        </div>
      </div>

      <div id="no-quizzes" class="card text-center hidden" style="padding: 3rem 1.5rem;">
        <p class="text-muted mb-2">No quizzes yet.</p>
        <a href="create.html" class="btn btn-primary">Create your first quiz</a>
      </div>
    </div>
  </div>

  <script type="module" src="js/teacher.js"></script>
</body>
</html>
