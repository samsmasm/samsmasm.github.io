<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UniQuiz</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="center">
    <div class="logo" style="font-size: 3.5rem; margin-bottom: 0.25rem;">UniQuiz</div>
    <p class="text-muted" style="margin-bottom: 1.5rem;">Enter your PIN to join a live session</p>

    <form id="pin-form" class="flex gap-sm" style="width: 100%; max-width: 340px;">
      <input
        type="text"
        id="pin-input"
        inputmode="numeric"
        pattern="\d{6}"
        maxlength="6"
        placeholder="6-digit PIN"
        autocomplete="off"
        style="font-size: 1.4rem; font-weight: 700; letter-spacing: 0.15em; text-align: center;"
        autofocus
      >
      <button type="submit" class="btn btn-primary btn-lg" style="flex-shrink:0;">Join</button>
    </form>

    <p id="pin-error" class="msg msg-error hidden" style="max-width: 340px; width: 100%;"></p>

    <a href="teacher.html" class="text-muted text-sm" style="margin-top: 2.5rem;">
      Teacher? Enter here →
    </a>
  </div>
  <script type="module" src="js/index.js"></script>
</body>
</html>
