<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UniQuiz</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="play-wrap">
    <div class="play-header">
      <span class="logo" style="font-size:1.35rem;">UniQuiz</span>
      <span class="text-muted text-sm" id="hdr-pin"></span>
    </div>

    <div class="play-body">

      <!-- Loading -->
      <div id="s-loading" style="flex:1;display:flex;align-items:center;justify-content:center;">
        <div class="spinner"></div>
      </div>

      <!-- Not found -->
      <div id="s-notfound" style="flex:1;display:none;flex-direction:column;align-items:center;justify-content:center;gap:1rem;text-align:center;">
        <h2>Session not found</h2>
        <p class="text-muted">Check your PIN and try again.</p>
        <a href="index.html" class="btn btn-primary">Back</a>
      </div>

      <!-- Waiting for host -->
      <div id="s-waiting" style="flex:1;display:none;flex-direction:column;align-items:center;justify-content:center;gap:0.75rem;text-align:center;padding:1.5rem;">
        <h2 id="w-title" style="font-size:1.3rem;"></h2>
        <div id="name-form" style="width:100%;max-width:320px;display:flex;flex-direction:column;gap:0.5rem;">
          <p class="text-muted text-sm">Enter your nickname to join</p>
          <input type="text" id="player-name" placeholder="Your nickname…" maxlength="20" style="text-align:center;">
          <button id="name-submit" class="btn btn-primary btn-full">Join</button>
        </div>
        <div id="name-set" style="display:none;flex-direction:column;align-items:center;gap:0.4rem;">
          <p class="text-muted">Waiting for host to start<span class="waiting-dots"></span></p>
          <p class="text-xs text-muted" id="name-display"></p>
        </div>
      </div>

      <!-- Active question -->
      <div id="s-question" style="display:none;flex-direction:column;gap:0.75rem;">
        <div id="play-timer" class="timer-display text-center hidden"></div>
        <div class="q-display" id="q-text"></div>
        <div class="answer-grid" id="ans-grid"></div>
        <div class="play-status" id="play-status"></div>
      </div>

      <!-- Rankings -->
      <div id="s-rankings" style="flex:1;display:none;flex-direction:column;gap:0.75rem;padding:0.5rem;overflow-y:auto;">
        <h2 class="text-center">Rankings</h2>
        <div class="card text-center" style="padding:1rem;">
          <div class="text-xs text-muted" style="text-transform:uppercase;letter-spacing:1px;margin-bottom:0.25rem;">Your Rank</div>
          <div id="my-rank-pos" style="font-size:2.5rem;font-weight:900;"></div>
          <div id="my-rank-score" style="font-size:1.3rem;font-weight:700;color:var(--accent);"></div>
          <div id="my-rank-delta" class="text-success text-sm mt-1"></div>
        </div>
        <div id="rankings-list-player"></div>
      </div>

      <!-- Ended -->
      <div id="s-ended" style="flex:1;display:none;flex-direction:column;align-items:center;justify-content:center;gap:0.75rem;text-align:center;">
        <h2>Session ended</h2>
        <p class="text-muted">Thanks for playing!</p>
        <a href="index.html" class="btn btn-primary">Play again</a>
      </div>

    </div>
  </div>
  <script type="module" src="js/play.js"></script>
</body>
</html>
