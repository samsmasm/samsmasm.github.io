<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#4f46e5">
  <link rel="icon" type="image/png" href="cultivarlogo.png">
  <title>Decks — Cultivar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="page-header">
  <h1>Decks</h1>
  <button class="btn btn-secondary" id="sync-btn" style="font-size:.8rem;padding:6px 12px;min-height:36px">Sync new words</button>
</header>

<main class="main-pad" id="main-content">
  <div style="text-align:right;margin-bottom:8px">
    <a href="cards.html" class="btn btn-secondary" style="font-size:.85rem;padding:7px 14px;min-height:34px">+ Add cards</a>
  </div>
  <div class="page-center" id="loading-state">
    <div class="spinner"></div>
  </div>
  <div class="card-list hidden" id="deck-list"></div>
  <div class="page-center empty-state hidden" id="empty-state">
    <div class="empty-icon">📦</div>
    <h2>No decks yet</h2>
    <p>Ask your teacher to add word lists, or add your own cards.</p>
  </div>
</main>

<nav class="bottom-nav">
  <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span><span class="nav-label">Home</span></a>
  <a href="decks.html" class="nav-item active"><span class="nav-icon">📦</span><span class="nav-label">Decks</span></a>
  <a href="dash.html" class="nav-item"><span class="nav-icon">📊</span><span class="nav-label">Dash</span></a>
</nav>

<div class="toast" id="toast"></div>

<script type="module">
import { auth } from './js/config.js';
import { getPublicDecks, getDeckProgress, subscribeToDeck, syncNewDeckWords, getUser, unenrollFromDeck } from './js/db.js';
import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

let uid = null;
let userData = null;

onAuthStateChanged(auth, async user => {
  if (!user) { window.location.href = 'index.html'; return; }
  uid = user.uid;
  userData = await getUser(uid);
  await loadDecks();
});

async function loadDecks() {
  const decks = await getPublicDecks();
  document.getElementById('loading-state').classList.add('hidden');

  if (decks.length === 0) {
    document.getElementById('empty-state').classList.remove('hidden');
    return;
  }

  const subscribed = new Set(userData?.subscribed_decks || []);

  // Load progress for subscribed decks in parallel
  const progressMap = {};
  await Promise.all(
    [...subscribed].map(async id => {
      progressMap[id] = await getDeckProgress(uid, id);
    })
  );

  const list = document.getElementById('deck-list');
  list.innerHTML = '';

  // Group by subject → unit
  const groups = {};
  for (const deck of decks) {
    const s = deck.subject || '';
    const u = deck.unit || '';
    if (!groups[s]) groups[s] = {};
    if (!groups[s][u]) groups[s][u] = [];
    groups[s][u].push(deck);
  }

  for (const subject of Object.keys(groups).sort()) {
    if (subject) {
      const sh = document.createElement('h2');
      sh.className = 'section-heading';
      sh.style.cssText = 'margin:20px 0 8px;font-size:1rem;color:var(--muted)';
      sh.textContent = subject;
      list.appendChild(sh);
    }
    for (const unit of Object.keys(groups[subject]).sort()) {
      if (unit) {
        const uh = document.createElement('h3');
        uh.style.cssText = 'margin:12px 0 6px;font-size:.85rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em';
        uh.textContent = unit;
        list.appendChild(uh);
      }
      for (const deck of groups[subject][unit]) {
        const isSub = subscribed.has(deck.id);
        const prog = progressMap[deck.id];
        const pct = prog && prog.total > 0 ? Math.round((prog.mastered / prog.total) * 100) : 0;

        const card = document.createElement('div');
        card.className = 'list-card';
        card.innerHTML = `
          <div class="list-card-body">
            <div class="list-card-title">${esc(deck.name)}</div>
            ${deck.description ? `<div class="list-card-sub">${esc(deck.description)}</div>` : ''}
            <div class="deck-meta">
              <span>${deck.word_count ?? 0} words</span>
              ${isSub && prog ? `<span>${prog.mastered}/${prog.total} mastered</span>` : ''}
            </div>
            ${isSub && prog && prog.total > 0 ? `
              <div class="mini-bar">
                <div class="mini-bar-fill" style="width:${pct}%"></div>
              </div>` : ''}
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
            ${isSub
              ? `<span class="badge badge-success">Enrolled</span>
                 <button class="btn btn-secondary unenroll-btn" data-deck-id="${deck.id}" data-deck-name="${esc(deck.name)}"
                   style="font-size:.75rem;padding:4px 10px;min-height:28px;color:var(--incorrect);border-color:var(--incorrect)">Unenroll</button>`
              : `<button class="btn btn-primary" style="font-size:.875rem;padding:8px 16px;min-height:38px"
                   data-deck-id="${deck.id}" data-deck-name="${esc(deck.name)}">Join</button>`
            }
            ${userData?.is_admin ? `<a href="cards.html?deck=${deck.id}" class="btn btn-secondary" style="font-size:.8rem;padding:5px 10px;min-height:30px;white-space:nowrap">Add words</a>` : ''}
          </div>
        `;
        list.appendChild(card);
      }
    }
  }

  list.classList.remove('hidden');

  // Attach join listeners
  list.querySelectorAll('[data-deck-id]:not(.unenroll-btn)').forEach(btn => {
    btn.addEventListener('click', () => handleJoin(btn));
  });

  // Attach unenroll listeners
  list.querySelectorAll('.unenroll-btn').forEach(btn => {
    btn.addEventListener('click', () => handleUnenroll(btn));
  });
}

async function handleJoin(btn) {
  const deckId = btn.dataset.deckId;
  const deckName = btn.dataset.deckName;
  btn.disabled = true;
  btn.textContent = 'Joining…';

  try {
    const newCards = await subscribeToDeck(uid, deckId);
    showToast(`Joined "${deckName}" — ${newCards} cards added`);
    // Reload to show enrolled state
    userData = await getUser(uid);
    await loadDecks();
  } catch (err) {
    console.error(err);
    showToast('Something went wrong. Try again.');
    btn.disabled = false;
    btn.textContent = 'Join';
  }
}

async function handleUnenroll(btn) {
  const deckName = btn.dataset.deckName;
  if (!confirm(`Unenroll from "${deckName}"?\n\nYour progress is saved — if you rejoin later you'll pick up where you left off.`)) return;
  btn.disabled = true;
  btn.textContent = 'Unenrolling…';
  try {
    await unenrollFromDeck(uid, btn.dataset.deckId);
    showToast(`Unenrolled from "${deckName}"`);
    userData = await getUser(uid);
    await loadDecks();
  } catch (err) {
    console.error(err);
    showToast('Something went wrong. Try again.');
    btn.disabled = false;
    btn.textContent = 'Unenroll';
  }
}

document.getElementById('sync-btn').addEventListener('click', async () => {
  const btn = document.getElementById('sync-btn');
  btn.disabled = true;
  btn.textContent = 'Syncing…';

  try {
    const subscribed = userData?.subscribed_decks || [];
    let total = 0;
    for (const deckId of subscribed) {
      total += await syncNewDeckWords(uid, deckId);
    }
    showToast(total > 0 ? `Added ${total} new cards` : 'Already up to date');
  } catch (err) {
    showToast('Sync failed. Try again.');
  }

  btn.disabled = false;
  btn.textContent = 'Sync new words';
});

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function esc(str) {
  return str?.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') ?? '';
}
</script>
</body>
</html>
