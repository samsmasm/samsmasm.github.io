<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#4f46e5">
  <link rel="icon" type="image/png" href="cultivarlogo.png">
  <title>Review — Cultivar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Filter / start screen -->
<div id="filter-view" class="page-center hidden" style="flex-direction:column;gap:16px;padding:24px">
  <h2 style="margin:0">Review</h2>
  <p id="session-summary" style="margin:0;font-size:.9rem;color:var(--muted);text-align:center"></p>
  <div class="form-group" style="width:100%;max-width:300px">
    <label for="subject-filter">Subject</label>
    <select id="subject-filter">
      <option value="">All subjects</option>
    </select>
  </div>
  <div class="form-group" style="width:100%;max-width:300px">
    <label for="tier-filter">Tier</label>
    <select id="tier-filter">
      <option value="">All tiers</option>
    </select>
  </div>
  <div class="form-group" style="width:100%;max-width:300px">
    <label for="category-filter">Category</label>
    <select id="category-filter">
      <option value="">All categories</option>
    </select>
  </div>
  <button class="btn btn-primary" id="start-btn" style="width:100%;max-width:300px">Start review</button>
  <button class="btn btn-secondary" id="practice-today-btn" style="width:100%;max-width:300px;display:none">Practice today's words</button>
  <button class="btn btn-secondary" id="add-more-btn" style="width:100%;max-width:300px"></button>
  <a href="index.html" class="btn btn-secondary" style="width:100%;max-width:300px">Cancel</a>
</div>

<!-- Loading -->
<div id="loading-view" class="page-center">
  <div class="spinner"></div>
  <p style="color:var(--muted);font-size:.9rem">Loading cards…</p>
</div>

<!-- All done -->
<div id="done-view" class="page-center empty-state hidden">
  <div class="empty-icon">🎉</div>
  <h2 id="done-title">Session complete!</h2>
  <p id="done-msg">You're all caught up for today.</p>
  <button class="btn btn-secondary hidden" id="repeat-btn" style="margin-top:8px;width:100%;max-width:280px">Repeat today's words</button>
  <a href="index.html" class="btn btn-primary" style="margin-top:8px">Back to Home</a>
</div>

<!-- Review UI -->
<div id="review-view" class="hidden">
  <header class="review-header">
    <a href="index.html" class="btn-icon" style="font-size:1.1rem">←</a>
    <div class="progress-track">
      <div class="progress-fill" id="prog-fill" style="width:0%"></div>
    </div>
    <span id="progress-text">0/0</span>
  </header>

  <div class="review-body">
    <div class="direction-chip" id="dir-chip"></div>

    <!-- Flashcard -->
    <div class="flip-wrap" id="flip-wrap">
      <div class="flip-card" id="flip-card">
        <div class="flip-front">
          <span class="card-hint-text">Tap to reveal</span>
          <div class="card-main-word" id="front-word"></div>
          <div class="card-example" id="front-extra" style="display:none"></div>
        </div>
        <div class="flip-back">
          <div class="card-translation" id="back-answer"></div>
          <div class="card-example" id="back-example" style="display:none"></div>
          <div class="card-notes" id="back-notes" style="display:none"></div>
        </div>
      </div>
    </div>

    <!-- Answer buttons (hidden until flipped) -->
    <div class="answer-row hidden" id="answer-row">
      <button class="btn-wrong" id="btn-wrong">✗ Didn't know</button>
      <button class="btn-right" id="btn-right">✓ Got it!</button>
    </div>

    <p class="tap-prompt" id="tap-prompt">Tap card to reveal answer</p>

    <!-- Level indicator -->
    <p id="level-label" style="font-size:.8rem;color:var(--muted)"></p>
  </div>
</div>

<script type="module">
import { auth } from './js/config.js';
import { getDueCards, updateProgress, getPublicDecks, getUser, autoIntroduceDaily, introduceWords, getPendingCount, getTodayCards } from './js/db.js';
import { levelLabel } from './js/srs.js';
import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

let queue = [];
let totalUnique = 0;
let mastered = 0;
let uid = null;
let flipped = false;
let allCards = [];
let deckMeta = {};
let pendingCount = 0;

async function loadAllCards() {
  const [cards, pending] = await Promise.all([getDueCards(uid), getPendingCount(uid)]);
  allCards = cards;
  pendingCount = pending;
}

async function updateFilterUI() {
  const newCount    = allCards.filter(c => c.progress.level === 0).length / 2;
  const reviewCount = allCards.filter(c => c.progress.level  > 0).length;
  document.getElementById('session-summary').textContent =
    `${Math.round(newCount)} new word${Math.round(newCount) !== 1 ? 's' : ''} · ${reviewCount} reviews` +
    (pendingCount > 0 ? ` · ${pendingCount} pending` : '');

  const addBtn = document.getElementById('add-more-btn');
  if (pendingCount > 0) {
    addBtn.textContent = `Add 12 more words (${pendingCount} pending)`;
    addBtn.disabled = false;
  } else {
    addBtn.textContent = 'No more pending words';
    addBtn.disabled = true;
  }

  // Show practice button if any words were introduced today
  const todayCards = await getTodayCards(uid);
  const practiceBtn = document.getElementById('practice-today-btn');
  if (todayCards.length > 0) {
    practiceBtn.textContent = `Practice today's words (${todayCards.length / 2 | 0})`;
    practiceBtn.style.display = '';
  } else {
    practiceBtn.style.display = 'none';
  }
}

onAuthStateChanged(auth, async user => {
  if (!user) { window.location.href = 'index.html'; return; }
  uid = user.uid;

  // Auto-introduce today's new words before loading the queue
  await autoIntroduceDaily(uid);

  const [decks] = await Promise.all([getPublicDecks(), loadAllCards()]);
  for (const d of decks) deckMeta[d.id] = d;

  document.getElementById('loading-view').classList.add('hidden');

  const subjectSet = new Set();
  const tierSet = new Set();
  const categorySet = new Set();
  for (const c of allCards) {
    if (c.progress.deck_id && deckMeta[c.progress.deck_id]?.subject)
      subjectSet.add(deckMeta[c.progress.deck_id].subject);
    if (c.word.tier) tierSet.add(c.word.tier);
    if (c.word.category) categorySet.add(c.word.category);
  }

  function populateSelect(id, values, labelFn = v => v) {
    const sel = document.getElementById(id);
    for (const v of [...values].sort()) {
      const opt = document.createElement('option');
      opt.value = v; opt.textContent = labelFn(v);
      sel.appendChild(opt);
    }
  }
  populateSelect('subject-filter', subjectSet);
  populateSelect('tier-filter', tierSet, v => `Tier ${v}`);
  populateSelect('category-filter', categorySet);

  updateFilterUI();
  document.getElementById('filter-view').classList.remove('hidden');
});

document.getElementById('add-more-btn').addEventListener('click', async () => {
  const btn = document.getElementById('add-more-btn');
  btn.disabled = true; btn.textContent = 'Introducing…';
  const introduced = await introduceWords(uid, 12);
  if (introduced > 0) {
    await loadAllCards();
    updateFilterUI();
  }
});

document.getElementById('start-btn').addEventListener('click', () => {
  const subject  = document.getElementById('subject-filter').value;
  const tier     = document.getElementById('tier-filter').value;
  const category = document.getElementById('category-filter').value;

  let filtered = allCards;
  if (subject)  filtered = filtered.filter(c => deckMeta[c.progress.deck_id]?.subject === subject);
  if (tier)     filtered = filtered.filter(c => c.word.tier === tier);
  if (category) filtered = filtered.filter(c => c.word.category === category);

  document.getElementById('filter-view').classList.add('hidden');

  if (filtered.length === 0) {
    const doneView = document.getElementById('done-view');
    document.getElementById('done-title').textContent = 'All caught up! 🎉';
    document.getElementById('done-msg').textContent = 'No cards due today match those filters.';
    doneView.classList.remove('hidden');
    return;
  }

  queue = shuffle([...filtered]);
  totalUnique = queue.length;
  mastered = 0;
  document.getElementById('review-view').classList.remove('hidden');
  showCard(queue[0]);
});

function showCard(card) {
  flipped = false;
  const fc = document.getElementById('flip-card');
  // Snap back to front instantly — no transition so answer never flashes
  fc.style.transition = 'none';
  fc.classList.remove('flipped');
  fc.getBoundingClientRect(); // force reflow before re-enabling transition
  fc.style.transition = '';

  document.getElementById('answer-row').classList.add('hidden');
  document.getElementById('tap-prompt').classList.remove('hidden');

  const { word, direction, progress } = card;

  const isSubject = word.card_type === 'subject';
  document.getElementById('dir-chip').textContent = isSubject
    ? (direction === 'vn_en' ? 'Term → Definition' : 'Definition → Term')
    : (direction === 'vn_en' ? 'Word → Translation' : 'Translation → Word');

  const frontWord  = direction === 'vn_en' ? word.vietnamese : word.english;
  const backAnswer = direction === 'vn_en' ? word.english    : word.vietnamese;
  const example    = direction === 'vn_en'
    ? (word.example_vn || word.example || '')
    : (word.example_en || word.example || '');

  document.getElementById('front-word').textContent = frontWord;
  setOptional('front-extra', '');
  document.getElementById('back-answer').textContent = backAnswer;
  setOptional('back-example', example);
  setOptional('back-notes', word.notes || '');

  document.getElementById('level-label').textContent =
    `Current level: ${levelLabel(progress.level)}`;

  updateBar();
}

function setOptional(id, text) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.style.display = text ? '' : 'none';
}

document.getElementById('flip-wrap').addEventListener('click', () => {
  if (flipped) {
    // Flip back to question
    flipped = false;
    document.getElementById('flip-card').classList.remove('flipped');
    document.getElementById('answer-row').classList.add('hidden');
    document.getElementById('tap-prompt').classList.remove('hidden');
  } else {
    // Flip to answer
    flipped = true;
    document.getElementById('flip-card').classList.add('flipped');
    document.getElementById('answer-row').classList.remove('hidden');
    document.getElementById('tap-prompt').classList.add('hidden');
  }
});

document.getElementById('btn-right').addEventListener('click', () => answer(true));
document.getElementById('btn-wrong').addEventListener('click', () => answer(false));

async function startPracticeToday() {
  const cards = await getTodayCards(uid);
  if (cards.length === 0) return;
  queue = shuffle([...cards]);
  totalUnique = queue.length;
  mastered = 0;
  document.getElementById('done-view').classList.add('hidden');
  document.getElementById('filter-view').classList.add('hidden');
  document.getElementById('repeat-btn').classList.add('hidden');
  document.getElementById('review-view').classList.remove('hidden');
  showCard(queue[0]);
}

document.getElementById('repeat-btn').addEventListener('click', startPracticeToday);
document.getElementById('practice-today-btn').addEventListener('click', startPracticeToday);

async function answer(correct) {
  // Disable buttons briefly to prevent double-tap
  document.getElementById('btn-right').disabled = true;
  document.getElementById('btn-wrong').disabled = true;

  const card = queue.shift();
  updateProgress(uid, card.progressId, correct).catch(console.error);

  if (correct) {
    mastered++;
  } else {
    queue.push(card); // retry at end of session
  }

  if (queue.length === 0) {
    document.getElementById('review-view').classList.add('hidden');
    document.getElementById('done-title').textContent = 'Session complete! 🎉';
    document.getElementById('done-msg').textContent =
      `You mastered ${mastered} card${mastered !== 1 ? 's' : ''} in this session. Keep it up!`;
    document.getElementById('repeat-btn').classList.remove('hidden');
    document.getElementById('done-view').classList.remove('hidden');
    return;
  }

  // Short delay for visual feedback before showing next card
  setTimeout(() => {
    document.getElementById('btn-right').disabled = false;
    document.getElementById('btn-wrong').disabled = false;
    showCard(queue[0]);
  }, 160);
}

function updateBar() {
  const pct = totalUnique > 0 ? (mastered / totalUnique) * 100 : 0;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${mastered}/${totalUnique}`;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
</script>
<nav class="bottom-nav">
  <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span><span class="nav-label">Home</span></a>
  <a href="review.html" class="nav-item active"><span class="nav-icon">📖</span><span class="nav-label">Review</span></a>
  <a href="decks.html" class="nav-item"><span class="nav-icon">📦</span><span class="nav-label">Decks</span></a>
  <a href="cards.html" class="nav-item"><span class="nav-icon">➕</span><span class="nav-label">Cards</span></a>
</nav>
</body>
</html>
