<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#4f46e5">
  <link rel="icon" type="image/png" href="cultivarlogo.png">
  <title>Dashboard — Cultivar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="page-header">
  <div style="display:flex;align-items:center;gap:8px">
    <img src="cultivarlogo.png" alt="" style="height:22px;width:auto;opacity:.55">
    <h1>Dashboard</h1>
  </div>
  <div style="width:44px"></div>
</header>

<main class="main-pad">

  <div class="form-group" style="margin-bottom:24px">
    <label for="dash-deck-select">Deck</label>
    <select id="dash-deck-select">
      <option value="">— choose a deck —</option>
    </select>
  </div>

  <div id="dash-content" class="hidden">

    <!-- Settings -->
    <div class="panel" style="margin-bottom:16px">
      <div class="panel-title">⚙️ Daily limits</div>
      <div class="panel-body">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:6px">
          <div class="form-group">
            <label for="setting-daily-new">New words / day</label>
            <input type="number" id="setting-daily-new" min="1" max="50" value="12" style="width:100%">
          </div>
          <div class="form-group">
            <label for="setting-session-max">Session cap (total)</label>
            <input type="number" id="setting-session-max" min="12" max="200" value="36" style="width:100%">
          </div>
        </div>
        <p style="font-size:.78rem;color:var(--muted);margin-bottom:12px">
          Each new word is tested in both directions, so 12 new words = 24 cards.
          The session cap is the total including new cards — the rest are reviews.
          Default 12 new / 36 total leaves 12 slots for reviews.
        </p>
        <button class="btn btn-primary btn-full" id="save-settings-btn">Save settings</button>
      </div>
    </div>

    <!-- Word list -->
    <div id="word-list-section" style="margin-bottom:32px">
      <div class="section-heading">
        <h2 id="word-list-heading">Words</h2>
      </div>
      <div id="word-loading" style="text-align:center;padding:20px;display:none">
        <div class="spinner" style="margin:0 auto"></div>
      </div>
      <div id="word-list"></div>
    </div>

    <!-- Reset progress — always at the bottom -->
    <div style="margin-top:48px;padding-top:24px;border-top:1px solid var(--border);text-align:center">
      <button id="reset-deck-btn" style="background:none;border:none;color:var(--muted);font-size:.8rem;cursor:pointer;text-decoration:underline">
        Reset progress for this deck
      </button>
    </div>
  </div>

</main>

<!-- Selection action bar — appears above nav when words are checked -->
<div id="selection-bar" style="display:none;position:fixed;bottom:var(--nav-h);left:0;right:0;max-width:540px;margin:0 auto;background:var(--surface);border-top:2px solid var(--brand);padding:10px 16px;align-items:center;gap:10px;z-index:20;box-shadow:0 -2px 8px rgba(0,0,0,.08)">
  <span id="sel-count" style="flex:1;font-size:.9rem;font-weight:600;color:var(--brand)"></span>
  <button id="sel-earlier-btn" class="btn btn-secondary" style="padding:6px 16px;min-height:36px">← Earlier</button>
  <button id="sel-later-btn" class="btn btn-secondary" style="padding:6px 16px;min-height:36px">Later →</button>
  <button id="sel-clear-btn" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:.8rem;padding:4px">Clear</button>
</div>

<nav class="bottom-nav">
  <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span><span class="nav-label">Home</span></a>
  <a href="decks.html" class="nav-item"><span class="nav-icon">📦</span><span class="nav-label">Decks</span></a>
  <a href="dash.html" class="nav-item active"><span class="nav-icon">📊</span><span class="nav-label">Dash</span></a>
</nav>

<div class="toast" id="toast"></div>

<script type="module">
import { auth } from './js/config.js';
import { getUser, getPublicDecks, resetDeckProgress, getUserSettings, updateUserSettings,
         getDeckWordsWithProgress, setWordStatus, bulkSetWordStatus, moveWordBox,
         bulkMoveWordBox, removeWordFromCycle, boxLabel } from './js/db.js';
import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

let uid = null;

onAuthStateChanged(auth, async user => {
  if (!user) { window.location.href = 'index.html'; return; }
  uid = user.uid;

  const [userData, decks, settings] = await Promise.all([getUser(uid), getPublicDecks(), getUserSettings(uid)]);
  document.getElementById('setting-daily-new').value = settings.daily_new;
  document.getElementById('setting-session-max').value = settings.session_max;

  const subscribed = new Set(userData?.subscribed_decks || []);
  const sel = document.getElementById('dash-deck-select');

  // Personal cards option
  sel.appendChild(new Option('Personal cards', 'personal'));

  // Subscribed decks
  for (const d of decks.filter(d => subscribed.has(d.id))) {
    sel.appendChild(new Option(d.name, d.id));
  }
});

document.getElementById('save-settings-btn').addEventListener('click', async () => {
  const btn = document.getElementById('save-settings-btn');
  btn.disabled = true; btn.textContent = 'Saving…';
  const daily_new   = Math.max(1,  Math.min(50,  parseInt(document.getElementById('setting-daily-new').value)  || 12));
  const session_max = Math.max(12, Math.min(200, parseInt(document.getElementById('setting-session-max').value) || 36));
  try {
    await updateUserSettings(uid, { daily_new, session_max });
    showToast('Settings saved');
  } catch (e) { showToast('Save failed'); }
  btn.disabled = false; btn.textContent = 'Save settings';
});

let currentDeckId = null;
let selectedIds   = new Set();
let lastCheckedIdx = -1;

document.getElementById('dash-deck-select').addEventListener('change', async e => {
  currentDeckId = e.target.value || null;
  document.getElementById('dash-content').classList.toggle('hidden', !currentDeckId);
  if (currentDeckId) await loadWordList();
});

// ── Selection bar ─────────────────────────────────────────────────────────────

function updateSelectionBar() {
  const bar = document.getElementById('selection-bar');
  const n   = selectedIds.size;
  document.getElementById('sel-count').textContent = `${n} selected`;
  bar.style.display = n > 0 ? 'flex' : 'none';
}

document.getElementById('sel-clear-btn').addEventListener('click', () => {
  selectedIds.clear();
  lastCheckedIdx = -1;
  document.querySelectorAll('.word-cb').forEach(c => c.checked = false);
  updateSelectionBar();
});

async function bulkMove(direction) {
  const eBtn = document.getElementById('sel-earlier-btn');
  const lBtn = document.getElementById('sel-later-btn');
  eBtn.disabled = lBtn.disabled = true;
  eBtn.textContent = direction === 'earlier' ? '← Moving…' : '← Earlier';
  lBtn.textContent = direction === 'later'   ? 'Moving… →' : 'Later →';

  const ids = [...selectedIds];
  await bulkMoveWordBox(uid, ids, direction);

  selectedIds.clear();
  lastCheckedIdx = -1;
  eBtn.textContent = '← Earlier'; lBtn.textContent = 'Later →';
  eBtn.disabled = lBtn.disabled = false;
  await loadWordList();
}

document.getElementById('sel-earlier-btn').addEventListener('click', () => bulkMove('earlier'));
document.getElementById('sel-later-btn').addEventListener('click',   () => bulkMove('later'));

// ── Word list ─────────────────────────────────────────────────────────────────

async function loadWordList() {
  selectedIds.clear();
  lastCheckedIdx = -1;
  updateSelectionBar();

  const loading = document.getElementById('word-loading');
  const list    = document.getElementById('word-list');
  loading.style.display = 'block';
  list.innerHTML = '';

  const words = await getDeckWordsWithProgress(uid, currentDeckId);
  const totalPending = words.filter(w => !w.introduced && w.status !== 'never').length;
  document.getElementById('word-list-heading').textContent = `Words (${words.length})`;
  loading.style.display = 'none';

  if (words.length === 0) {
    list.innerHTML = '<p style="color:var(--muted);font-size:.9rem;padding:8px 0">No words yet.</p>';
    return;
  }

  // Top-level bulk "Ask all pending" for the whole deck
  if (totalPending > 0) {
    const topBtn = document.createElement('button');
    topBtn.className = 'btn btn-secondary btn-full';
    topBtn.style.marginBottom = '16px';
    topBtn.textContent = `Ask all ${totalPending} pending words soon`;
    topBtn.addEventListener('click', async () => {
      topBtn.disabled = true; topBtn.textContent = 'Marking…';
      await bulkSetWordStatus(uid, currentDeckId, words.filter(w => !w.introduced && w.status !== 'never').map(w => w.id), 'ask_soon');
      await loadWordList();
    });
    list.appendChild(topBtn);
  }

  // Group by category
  const grouped = {};
  for (const item of words) {
    const cat = item.word.category || '';
    if (!grouped[cat]) grouped[cat] = [];
    grouped[cat].push(item);
  }
  const cats = Object.keys(grouped).sort((a, b) =>
    !a && b ? 1 : a && !b ? -1 : a.localeCompare(b)
  );
  const showHeaders = cats.length > 1 || cats[0] !== '';

  let orderIdx = 0;
  for (const cat of cats) {
    const catWords   = grouped[cat];
    const catPending = catWords.filter(w => !w.introduced && w.status !== 'never');

    if (showHeaders) {
      const header = document.createElement('div');
      header.style.cssText = 'display:flex;align-items:center;justify-content:space-between;margin:16px 0 4px;padding-bottom:4px;border-bottom:2px solid var(--border)';
      const title = document.createElement('span');
      title.textContent = cat || 'Uncategorised';
      title.style.cssText = 'font-size:.8rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em';
      header.appendChild(title);
      if (catPending.length > 0) {
        const catBtn = document.createElement('button');
        catBtn.textContent = `Ask all ${catPending.length} pending`;
        catBtn.style.cssText = 'font-size:.72rem;padding:3px 8px;border-radius:6px;cursor:pointer;border:1px solid var(--correct);background:none;color:var(--correct)';
        catBtn.addEventListener('click', async () => {
          catBtn.disabled = true; catBtn.textContent = 'Marking…';
          await bulkSetWordStatus(uid, currentDeckId, catPending.map(w => w.id), 'ask_soon');
          await loadWordList();
        });
        header.appendChild(catBtn);
      }
      list.appendChild(header);
    }

    for (const item of catWords) {
      list.appendChild(renderWordRow(item, orderIdx++));
    }
  }
}

function renderWordRow(item, orderIdx = -1) {
  const { id, word, introduced, progress, status } = item;
  const front = word.vietnamese || '';
  const back  = word.english   || '';

  const row = document.createElement('div');
  row.dataset.wordId   = id;
  if (orderIdx >= 0) row.dataset.orderIdx = orderIdx;
  row.style.cssText = 'display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--border)';

  // Checkbox
  const cb = document.createElement('input');
  cb.type = 'checkbox'; cb.className = 'word-cb';
  cb.style.cssText = 'width:18px;height:18px;flex-shrink:0;cursor:pointer;accent-color:var(--brand)';
  cb.addEventListener('click', e => {
    if (e.shiftKey && lastCheckedIdx >= 0 && orderIdx >= 0) {
      const lo = Math.min(orderIdx, lastCheckedIdx);
      const hi = Math.max(orderIdx, lastCheckedIdx);
      document.querySelectorAll('[data-order-idx]').forEach(r => {
        const rIdx = parseInt(r.dataset.orderIdx);
        if (rIdx >= lo && rIdx <= hi) {
          const c = r.querySelector('.word-cb');
          if (c) { c.checked = true; selectedIds.add(r.dataset.wordId); }
        }
      });
    } else {
      cb.checked ? selectedIds.add(id) : selectedIds.delete(id);
    }
    if (orderIdx >= 0) lastCheckedIdx = orderIdx;
    updateSelectionBar();
  });
  row.appendChild(cb);

  // Word text
  const label = document.createElement('div');
  label.style.cssText = 'flex:1;min-width:0;overflow:hidden';
  label.innerHTML = `<span style="font-weight:600">${esc(front)}</span><span style="color:var(--muted);margin:0 4px">→</span><span style="color:var(--muted);font-size:.9rem">${esc(back)}</span>`;
  row.appendChild(label);

  if (introduced && progress) {
    const boxWrap = document.createElement('div');
    boxWrap.style.cssText = 'display:flex;align-items:center;gap:4px;flex-shrink:0';

    const btnStyle = 'background:none;border:1px solid var(--border);border-radius:6px;padding:2px 7px;cursor:pointer;font-size:.85rem';
    const leftBtn  = Object.assign(document.createElement('button'), { textContent: '←', title: 'Earlier box' });
    const boxSpan  = document.createElement('span');
    const rightBtn = Object.assign(document.createElement('button'), { textContent: '→', title: 'Later box'   });
    [leftBtn, rightBtn].forEach(b => b.style.cssText = btnStyle);
    leftBtn.disabled  = progress.level === 0;
    rightBtn.disabled = progress.level === 6;
    boxSpan.textContent = boxLabel(progress.level);
    boxSpan.style.cssText = 'font-size:.8rem;color:var(--muted);min-width:58px;text-align:center';

    const moveOne = async direction => {
      leftBtn.disabled = rightBtn.disabled = true;
      selectedIds.delete(id); updateSelectionBar();
      await moveWordBox(uid, id, direction);
      const newLevel = direction === 'earlier' ? Math.max(0, progress.level-1) : Math.min(6, progress.level+1);
      row.replaceWith(renderWordRow({ ...item, progress: { ...progress, level: newLevel } }, orderIdx));
    };
    leftBtn.addEventListener('click',  () => moveOne('earlier'));
    rightBtn.addEventListener('click', () => moveOne('later'));
    boxWrap.append(leftBtn, boxSpan, rightBtn);
    row.appendChild(boxWrap);

    const neverBtn = document.createElement('button');
    neverBtn.textContent = 'Never';
    neverBtn.style.cssText = 'background:none;border:none;font-size:.72rem;color:var(--muted);cursor:pointer;text-decoration:underline;flex-shrink:0';
    neverBtn.addEventListener('click', async () => {
      if (!confirm(`Remove "${front}" from your review cycle?`)) return;
      neverBtn.disabled = true;
      await removeWordFromCycle(uid, currentDeckId, id);
      selectedIds.delete(id); updateSelectionBar();
      row.remove();
    });
    row.appendChild(neverBtn);

  } else {
    const btnWrap = document.createElement('div');
    btnWrap.style.cssText = 'display:flex;gap:4px;flex-shrink:0;flex-wrap:wrap';
    for (const { key, label, color } of [
      { key: 'ask_soon', label: 'Ask soon',    color: 'var(--correct)'   },
      { key: 'skip',     label: 'Skip',        color: 'var(--muted)'     },
      { key: 'never',    label: 'Never',       color: 'var(--incorrect)' },
    ]) {
      const isActive = status === key;
      const btn = document.createElement('button');
      btn.textContent = label;
      btn.style.cssText = `font-size:.72rem;padding:3px 8px;border-radius:6px;cursor:pointer;border:1px solid ${color};background:${isActive ? color : 'none'};color:${isActive ? '#fff' : color}`;
      btn.addEventListener('click', async () => {
        btn.disabled = true;
        await setWordStatus(uid, currentDeckId, id, isActive ? 'normal' : key);
        row.replaceWith(renderWordRow({ ...item, status: isActive ? 'normal' : key }, orderIdx));
      });
      btnWrap.appendChild(btn);
    }
    row.appendChild(btnWrap);
  }

  return row;
}

function esc(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('reset-deck-btn').addEventListener('click', async () => {
  const sel = document.getElementById('dash-deck-select');
  const deckName = sel.selectedOptions[0]?.text || 'this deck';

  const first = confirm(`Reset progress for "${deckName}"?\n\nYour SRS history for all words in this deck will be permanently deleted. You'll start from scratch with this deck.`);
  if (!first) return;
  const second = confirm(`Are you absolutely sure?\n\nThis cannot be undone.`);
  if (!second) return;

  const btn = document.getElementById('reset-deck-btn');
  btn.textContent = 'Resetting…';
  btn.disabled = true;

  try {
    await resetDeckProgress(uid, sel.value);
    showToast(`Progress reset for "${deckName}"`);
    btn.textContent = 'Progress reset';
  } catch (err) {
    console.error(err);
    showToast('Reset failed. Try again.');
    btn.textContent = 'Reset progress for this deck';
    btn.disabled = false;
  }
});

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}
</script>
</body>
</html>
