<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#4f46e5">
  <link rel="icon" type="image/png" href="cultivarlogo.png">
  <title>Dashboard — Cultivar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="page-header">
  <h1>Dashboard</h1>
</header>

<main class="main-pad">

  <div class="form-group" style="margin-bottom:24px">
    <label for="dash-deck-select">Deck</label>
    <select id="dash-deck-select">
      <option value="">— choose a deck —</option>
    </select>
  </div>

  <div id="dash-content" class="hidden">

    <!-- Settings -->
    <div class="panel" style="margin-bottom:16px">
      <div class="panel-title">⚙️ Daily limits</div>
      <div class="panel-body">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:6px">
          <div class="form-group">
            <label for="setting-daily-new">New words / day</label>
            <input type="number" id="setting-daily-new" min="1" max="50" value="12" style="width:100%">
          </div>
          <div class="form-group">
            <label for="setting-session-max">Session cap (total)</label>
            <input type="number" id="setting-session-max" min="12" max="200" value="36" style="width:100%">
          </div>
        </div>
        <p style="font-size:.78rem;color:var(--muted);margin-bottom:12px">
          Each new word is tested in both directions, so 12 new words = 24 cards.
          The session cap is the total including new cards — the rest are reviews.
          Default 12 new / 36 total leaves 12 slots for reviews.
        </p>
        <button class="btn btn-primary btn-full" id="save-settings-btn">Save settings</button>
      </div>
    </div>

    <!-- Word list -->
    <div id="word-list-section" style="margin-bottom:32px">
      <div class="section-heading">
        <h2 id="word-list-heading">Words</h2>
      </div>
      <div id="word-loading" style="text-align:center;padding:20px;display:none">
        <div class="spinner" style="margin:0 auto"></div>
      </div>
      <div id="word-list"></div>
    </div>

    <!-- Reset progress — always at the bottom -->
    <div style="margin-top:48px;padding-top:24px;border-top:1px solid var(--border);text-align:center">
      <button id="reset-deck-btn" style="background:none;border:none;color:var(--muted);font-size:.8rem;cursor:pointer;text-decoration:underline">
        Reset progress for this deck
      </button>
    </div>
  </div>

</main>

<nav class="bottom-nav">
  <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span><span class="nav-label">Home</span></a>
  <a href="decks.html" class="nav-item"><span class="nav-icon">📦</span><span class="nav-label">Decks</span></a>
  <a href="dash.html" class="nav-item active"><span class="nav-icon">📊</span><span class="nav-label">Dash</span></a>
</nav>

<div class="toast" id="toast"></div>

<script type="module">
import { auth } from './js/config.js';
import { getUser, getPublicDecks, resetDeckProgress, getUserSettings, updateUserSettings,
         getDeckWordsWithProgress, setWordStatus, moveWordBox, removeWordFromCycle, boxLabel } from './js/db.js';
import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

let uid = null;

onAuthStateChanged(auth, async user => {
  if (!user) { window.location.href = 'index.html'; return; }
  uid = user.uid;

  const [userData, decks, settings] = await Promise.all([getUser(uid), getPublicDecks(), getUserSettings(uid)]);
  document.getElementById('setting-daily-new').value = settings.daily_new;
  document.getElementById('setting-session-max').value = settings.session_max;

  const subscribed = new Set(userData?.subscribed_decks || []);
  const sel = document.getElementById('dash-deck-select');

  // Personal cards option
  sel.appendChild(new Option('Personal cards', 'personal'));

  // Subscribed decks
  for (const d of decks.filter(d => subscribed.has(d.id))) {
    sel.appendChild(new Option(d.name, d.id));
  }
});

document.getElementById('save-settings-btn').addEventListener('click', async () => {
  const btn = document.getElementById('save-settings-btn');
  btn.disabled = true; btn.textContent = 'Saving…';
  const daily_new   = Math.max(1,  Math.min(50,  parseInt(document.getElementById('setting-daily-new').value)  || 12));
  const session_max = Math.max(12, Math.min(200, parseInt(document.getElementById('setting-session-max').value) || 36));
  try {
    await updateUserSettings(uid, { daily_new, session_max });
    showToast('Settings saved');
  } catch (e) { showToast('Save failed'); }
  btn.disabled = false; btn.textContent = 'Save settings';
});

let currentDeckId = null;

document.getElementById('dash-deck-select').addEventListener('change', async e => {
  currentDeckId = e.target.value || null;
  document.getElementById('dash-content').classList.toggle('hidden', !currentDeckId);
  if (currentDeckId) await loadWordList();
});

async function loadWordList() {
  const loading = document.getElementById('word-loading');
  const list    = document.getElementById('word-list');
  loading.style.display = 'block';
  list.innerHTML = '';

  const words = await getDeckWordsWithProgress(uid, currentDeckId);
  document.getElementById('word-list-heading').textContent = `Words (${words.length})`;
  loading.style.display = 'none';

  if (words.length === 0) {
    list.innerHTML = '<p style="color:var(--muted);font-size:.9rem;padding:8px 0">No words yet.</p>';
    return;
  }

  for (const item of words) {
    list.appendChild(renderWordRow(item));
  }
}

function renderWordRow(item) {
  const { id, word, introduced, progress, status } = item;
  const front = word.vietnamese || word.term || '';
  const back  = word.english   || word.definition || '';

  const row = document.createElement('div');
  row.dataset.wordId = id;
  row.style.cssText = 'display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--border);flex-wrap:wrap';

  // Word text
  const label = document.createElement('div');
  label.style.cssText = 'flex:1;min-width:0';
  label.innerHTML = `<span style="font-weight:600">${esc(front)}</span><span style="color:var(--muted);margin:0 4px">→</span><span style="color:var(--muted)">${esc(back)}</span>`;
  row.appendChild(label);

  if (introduced && progress) {
    // Box label + left/right arrows
    const boxWrap = document.createElement('div');
    boxWrap.style.cssText = 'display:flex;align-items:center;gap:4px;flex-shrink:0';

    const leftBtn = document.createElement('button');
    leftBtn.textContent = '←';
    leftBtn.title = 'Earlier box';
    leftBtn.disabled = progress.level === 0;
    leftBtn.style.cssText = 'background:none;border:1px solid var(--border);border-radius:6px;padding:2px 7px;cursor:pointer;font-size:.85rem';

    const boxSpan = document.createElement('span');
    boxSpan.textContent = boxLabel(progress.level);
    boxSpan.style.cssText = 'font-size:.8rem;color:var(--muted);min-width:60px;text-align:center';

    const rightBtn = document.createElement('button');
    rightBtn.textContent = '→';
    rightBtn.title = 'Later box';
    rightBtn.disabled = progress.level === 6;
    rightBtn.style.cssText = leftBtn.style.cssText;

    leftBtn.addEventListener('click', async () => {
      leftBtn.disabled = rightBtn.disabled = true;
      await moveWordBox(uid, id, 'earlier');
      const updated = await getDeckWordsWithProgress(uid, currentDeckId);
      const newItem = updated.find(w => w.id === id);
      if (newItem) row.replaceWith(renderWordRow(newItem));
    });

    rightBtn.addEventListener('click', async () => {
      leftBtn.disabled = rightBtn.disabled = true;
      await moveWordBox(uid, id, 'later');
      const updated = await getDeckWordsWithProgress(uid, currentDeckId);
      const newItem = updated.find(w => w.id === id);
      if (newItem) row.replaceWith(renderWordRow(newItem));
    });

    boxWrap.append(leftBtn, boxSpan, rightBtn);
    row.appendChild(boxWrap);

    // Never ask button
    const neverBtn = document.createElement('button');
    neverBtn.textContent = 'Never ask';
    neverBtn.style.cssText = 'background:none;border:none;font-size:.75rem;color:var(--muted);cursor:pointer;text-decoration:underline;flex-shrink:0';
    neverBtn.addEventListener('click', async () => {
      if (!confirm(`Remove "${front}" from your review cycle?`)) return;
      neverBtn.disabled = true;
      await removeWordFromCycle(uid, currentDeckId, id);
      row.remove();
    });
    row.appendChild(neverBtn);

  } else {
    // Pending word — status buttons
    const btnWrap = document.createElement('div');
    btnWrap.style.cssText = 'display:flex;gap:4px;flex-shrink:0;flex-wrap:wrap';

    const statuses = [
      { key: 'ask_soon', label: 'Ask soon', color: 'var(--correct)' },
      { key: 'skip',     label: 'Skip for now', color: 'var(--muted)' },
      { key: 'never',    label: 'Never',    color: 'var(--incorrect)' },
    ];

    for (const { key, label, color } of statuses) {
      const btn = document.createElement('button');
      btn.textContent = label;
      const isActive = status === key;
      btn.style.cssText = `font-size:.72rem;padding:3px 8px;border-radius:6px;cursor:pointer;border:1px solid ${color};background:${isActive ? color : 'none'};color:${isActive ? '#fff' : color}`;
      btn.addEventListener('click', async () => {
        btn.disabled = true;
        const newStatus = isActive ? 'normal' : key;
        await setWordStatus(uid, currentDeckId, id, newStatus);
        const updated = await getDeckWordsWithProgress(uid, currentDeckId);
        const newItem = updated.find(w => w.id === id);
        if (newItem) row.replaceWith(renderWordRow(newItem));
      });
      btnWrap.appendChild(btn);
    }
    row.appendChild(btnWrap);
  }

  return row;
}

function esc(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('reset-deck-btn').addEventListener('click', async () => {
  const sel = document.getElementById('dash-deck-select');
  const deckName = sel.selectedOptions[0]?.text || 'this deck';

  const first = confirm(`Reset progress for "${deckName}"?\n\nYour SRS history for all words in this deck will be permanently deleted. You'll start from scratch with this deck.`);
  if (!first) return;
  const second = confirm(`Are you absolutely sure?\n\nThis cannot be undone.`);
  if (!second) return;

  const btn = document.getElementById('reset-deck-btn');
  btn.textContent = 'Resetting…';
  btn.disabled = true;

  try {
    await resetDeckProgress(uid, sel.value);
    showToast(`Progress reset for "${deckName}"`);
    btn.textContent = 'Progress reset';
  } catch (err) {
    console.error(err);
    showToast('Reset failed. Try again.');
    btn.textContent = 'Reset progress for this deck';
    btn.disabled = false;
  }
});

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}
</script>
</body>
</html>
