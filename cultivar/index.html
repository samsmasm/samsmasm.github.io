<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#4f46e5">
  <link rel="icon" type="image/png" href="cultivarlogo.png">
  <title>Cultivar</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 14px 20px;
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      color: var(--text);
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: box-shadow 0.2s, transform 0.1s;
      min-height: 52px;
    }
    .google-btn:hover  { box-shadow: var(--shadow-lg); }
    .google-btn:active { transform: scale(0.98); }
    .google-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .google-logo {
      width: 20px; height: 20px; flex-shrink: 0;
    }
  </style>
</head>
<body>

<!-- ── Loading (while auth state resolves) ────────────────── -->
<div id="loading-view" class="page-center">
  <div class="spinner"></div>
</div>

<!-- ── Auth screen ────────────────────────────────────────── -->
<div id="auth-view" class="page-center hidden">
  <div class="auth-wrap">
    <div style="text-align:center;margin-bottom:12px">
      <img src="cultivarlogo.png" alt="Cultivar logo" style="height:80px;width:auto;filter:drop-shadow(0 2px 8px rgba(0,0,0,.08))">
      <p class="brand-tagline" style="margin-top:12px">Spaced repetition learning</p>
    </div>

    <div class="auth-form" style="gap:16px">
      <p style="color:var(--muted);font-size:.9rem;text-align:center">
        Sign in to sync your progress across devices.
      </p>
      <button class="google-btn" id="google-btn">
        <svg class="google-logo" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.2l6.7-6.7C35.7 2.5 30.2 0 24 0 14.6 0 6.6 5.4 2.7 13.3l7.8 6C12.4 13.2 17.8 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4.1 7.1-10.1 7.1-17z"/>
          <path fill="#FBBC05" d="M10.5 28.7A14.5 14.5 0 0 1 9.5 24c0-1.6.3-3.2.8-4.7l-7.8-6A24 24 0 0 0 0 24c0 3.9.9 7.5 2.7 10.7l7.8-6z"/>
          <path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.5-5.8c-2 1.4-4.6 2.2-7.7 2.2-6.2 0-11.5-4.2-13.4-9.8l-7.8 6C6.6 42.6 14.6 48 24 48z"/>
        </svg>
        Continue with Google
      </button>
      <p class="error-msg hidden" id="auth-error"></p>
    </div>
  </div>
</div>

<!-- ── Dashboard (logged in) ──────────────────────────────── -->
<div id="app-view" class="hidden">
  <header class="page-header">
    <div style="width:44px"></div>
    <div></div>
    <button class="btn btn-secondary" id="logout-btn" style="font-size:.75rem;padding:5px 12px;min-height:30px">Sign out</button>
  </header>

  <main class="main-pad">

    <div style="text-align:center;padding:12px 0 20px">
      <img src="cultivarlogo.png" alt="Cultivar" style="height:60px;width:auto">
      <div style="font-size:1.75rem;font-weight:800;color:var(--brand);letter-spacing:-.03em;margin-top:8px">Cultivar</div>
      <div style="font-size:.82rem;color:var(--muted);margin-top:2px">Spaced repetition learning</div>
      <p class="greeting" style="margin-top:10px;font-size:.9rem">Welcome back, <strong id="user-name">…</strong></p>
    </div>

    <div id="deck-buttons" style="display:flex;flex-direction:column;gap:10px;margin-bottom:20px">
      <div class="spinner" style="margin:24px auto"></div>
    </div>

    <!-- Progress stats -->
    <div id="stats-section" class="hidden" style="margin-bottom:20px">
      <div style="font-size:.75rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Your progress</div>
      <div id="stats-bars"></div>
    </div>

    <div class="quick-grid">
      <a href="decks.html" class="quick-tile">📦 Decks</a>
      <a href="admin.html" class="quick-tile hidden" id="admin-link">⚙️ Admin</a>
    </div>

  </main>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item active"><span class="nav-icon">🏠</span><span class="nav-label">Home</span></a>
    <a href="decks.html" class="nav-item"><span class="nav-icon">📦</span><span class="nav-label">Decks</span></a>
    <a href="dash.html" class="nav-item"><span class="nav-icon">📊</span><span class="nav-label">Dash</span></a>
  </nav>
</div>

<script type="module">
import { auth } from './js/config.js';
import { getOrCreateUser, getPublicDecks, getUser, getPersonalCards, getProgressStats } from './js/db.js';
import {
  onAuthStateChanged, signOut,
  GoogleAuthProvider, signInWithPopup, signInWithRedirect, getRedirectResult
} from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

const provider = new GoogleAuthProvider();

const authView = document.getElementById('auth-view');
const appView  = document.getElementById('app-view');

// Handle redirect result on mobile (redirect flow lands back here)
getRedirectResult(auth).catch(() => {});

onAuthStateChanged(auth, async user => {
  document.getElementById('loading-view').classList.add('hidden');
  if (!user) {
    authView.classList.remove('hidden');
    appView.classList.add('hidden');
    return;
  }
  authView.classList.add('hidden');
  appView.classList.remove('hidden');

  try {
    const userData = await getOrCreateUser(user);
    document.getElementById('user-name').textContent = userData.display_name;
    if (userData.is_admin) document.getElementById('admin-link').classList.remove('hidden');
  } catch (e) { console.error('user load', e); }

  // Build per-deck buttons
  try {
    const [fullUserData, allDecks, personalCards] = await Promise.all([
      getUser(user.uid),
      getPublicDecks(),
      getPersonalCards(user.uid)
    ]);

    const subscribed = new Set(fullUserData?.subscribed_decks || []);
    const myDecks = allDecks.filter(d => subscribed.has(d.id));
    const container = document.getElementById('deck-buttons');
    container.innerHTML = '';

    if (myDecks.length === 0 && personalCards.length === 0) {
      container.innerHTML = '<p style="color:var(--muted);text-align:center;padding:16px 0">Enrol in a deck to get started.</p>';
    }

    for (const deck of myDecks) {
      const a = document.createElement('a');
      a.href = `review.html?deck=${deck.id}`;
      a.className = 'btn btn-primary btn-full btn-large';
      a.textContent = `Ask today's ${deck.name}`;
      container.appendChild(a);
    }

    if (personalCards.length > 0) {
      const a = document.createElement('a');
      a.href = 'review.html?deck=personal';
      a.className = 'btn btn-secondary btn-full';
      a.style.minHeight = '52px';
      a.textContent = 'Ask personal cards';
      container.appendChild(a);
    }
  } catch (e) { console.error('deck buttons', e); }

  // Progress stats — loads independently
  getProgressStats(user.uid).then(counts => {
    const labels = [
      'New',
      'Seen it',
      'Know a bit',
      'Getting there',
      'Comfortable',
      'Strong',
      'Mastered'
    ];
    const total = counts.reduce((s, n) => s + n, 0);
    if (total === 0) return;

    const section = document.getElementById('stats-section');
    const bars    = document.getElementById('stats-bars');
    bars.innerHTML = '';
    const max = Math.max(...counts, 1);

    counts.forEach((n, i) => {
      if (n === 0 && i > 3) return; // hide empty high-level boxes
      const row = document.createElement('div');
      row.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:5px';

      const lbl = document.createElement('span');
      lbl.textContent = labels[i];
      lbl.style.cssText = 'font-size:.78rem;color:var(--muted);width:110px;flex-shrink:0';

      const track = document.createElement('div');
      track.style.cssText = 'flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden';
      const fill = document.createElement('div');
      const hue = Math.round(i * (120 / 6)); // green=120 at level 6, red-ish=0 at level 0
      fill.style.cssText = `height:100%;border-radius:4px;width:${Math.round((n/max)*100)}%;background:hsl(${hue},60%,52%);transition:width .4s`;
      track.appendChild(fill);

      const cnt = document.createElement('span');
      cnt.textContent = n;
      cnt.style.cssText = 'font-size:.78rem;font-weight:600;color:var(--text);min-width:24px;text-align:right';

      row.append(lbl, track, cnt);
      bars.appendChild(row);
    });

    section.classList.remove('hidden');
  }).catch(() => {});
});

document.getElementById('google-btn').addEventListener('click', async () => {
  const btn = document.getElementById('google-btn');
  btn.disabled = true;
  const errEl = document.getElementById('auth-error');
  errEl.classList.add('hidden');

  try {
    // Popup works on desktop; on mobile we fall back to redirect
    await signInWithPopup(auth, provider);
  } catch (err) {
    if (err.code === 'auth/popup-blocked' || err.code === 'auth/popup-closed-by-user') {
      // Retry with redirect on mobile
      signInWithRedirect(auth, provider);
      return;
    }
    errEl.textContent = 'Sign-in failed. Please try again.';
    errEl.classList.remove('hidden');
    btn.disabled = false;
  }
});

document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

</script>
</body>
</html>
