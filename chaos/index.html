<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/unisamicon2.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chaos Game</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <aside id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">Chaos Game</span>
    </div>

    <div class="sidebar-content">

      <section class="ctrl-section">
        <div class="ctrl-label">Presets</div>
        <div class="preset-grid">
          <button class="preset-btn" data-shape="triangle">Triangle</button>
          <button class="preset-btn" data-shape="square">Square</button>
          <button class="preset-btn" data-shape="pentagon">Pentagon</button>
          <button class="preset-btn" data-shape="hexagon">Hexagon</button>
        </div>
        <p class="hint">Or click the canvas to place vertices.</p>
      </section>

      <section class="ctrl-section" id="vertexColorSection">
        <div class="ctrl-label">Next Vertex Color</div>
        <div id="colorPalette" class="color-palette"></div>
      </section>

      <section class="ctrl-section">
        <div class="ctrl-label">Color Mode</div>
        <select id="modeSelect" class="ctrl-select">
          <option value="perVertex">Per Vertex</option>
          <option value="redOnly">Red Only</option>
          <option value="redBlue">Red / Blue</option>
        </select>
        <div id="blueProbabilityContainer">
          <div class="ctrl-row ctrl-row-slider">
            <label>Blue prob. <span id="blueProbDisplay" class="val-display">0.50</span></label>
            <input type="range" id="blueProbability" value="0.5" min="0" max="1" step="0.05">
          </div>
        </div>
      </section>

      <section class="ctrl-section">
        <div class="ctrl-label">Simulation</div>
        <div class="ctrl-row">
          <label>Iterations</label>
          <input type="number" id="iterations" value="30000" min="100" max="500000" step="1000" class="ctrl-number">
        </div>
        <div class="ctrl-row ctrl-row-slider">
          <label>Fraction <span id="fractionDisplay" class="val-display">0.50</span></label>
          <input type="range" id="fraction" value="0.5" min="0.01" max="0.99" step="0.01">
        </div>
        <div class="ctrl-row">
          <label>Exclusion</label>
          <select id="exclusionRule" class="ctrl-select-sm">
            <option value="none">None</option>
            <option value="noRepeat">No repeat</option>
            <option value="noAdjacent">No adjacent</option>
          </select>
        </div>
      </section>

      <section class="ctrl-section">
        <div class="ctrl-label">Display</div>
        <label class="toggle-row">
          <input type="checkbox" id="drawTraces"> Trace lines
        </label>
        <label class="toggle-row">
          <input type="checkbox" id="colorPoints" checked> Colored points
        </label>
        <label class="toggle-row">
          <input type="checkbox" id="showLabels" checked> Vertex labels
        </label>
      </section>

      <div id="statusMessage" class="status-msg"></div>

    </div>

    <div class="sidebar-actions">
      <button id="startButton" class="btn btn-primary">Start</button>
      <div class="btn-row">
        <button id="resetSimulationButton" class="btn btn-secondary">Reset Sim</button>
        <button id="resetAllButton" class="btn btn-danger">Reset All</button>
      </div>
      <button id="exportButton" class="btn btn-ghost">Export PNG</button>
    </div>
  </aside>

  <div id="sidebarOverlay"></div>

  <main id="canvasArea">
    <button id="mobileMenuBtn" aria-label="Open controls">&#9776;</button>
    <canvas id="canvas"></canvas>
  </main>

  <script src="script.js"></script>
</body>
</html>
