<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="/unisamicon2.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Scrim | Collaborative Web</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/@panzoom/panzoom@4.5.1/dist/panzoom.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
</head>
<body>

    <div class="ui-layer">
        <div class="top-bar">
            <h1 class="logo">SCRIM</h1>
            <div id="room-display" title="Click to load a room">#...</div>
        </div>

        <div class="toolbar">
            <button onclick="addNote()" class="tool-btn" title="Add Note">📝</button>
            <div class="divider"></div>
            <button onclick="addArrow('solid', false)" class="tool-btn" title="Solid Line">➖</button>
            <button onclick="addArrow('dotted', false)" class="tool-btn" title="Dotted Line">┄</button>
            <button onclick="addArrow('solid', true)" class="tool-btn" title="Solid Arrow">➝</button>
            <button onclick="addArrow('dotted', true)" class="tool-btn" title="Dotted Arrow">⇢</button>
            <div class="divider"></div>
            <button onclick="exportJPG()" class="tool-btn" style="font-size: 0.8rem; font-weight:bold;">JPG</button>
            <button onclick="exportTXT()" class="tool-btn" style="font-size: 0.8rem; font-weight:bold;">TXT</button>
            <div class="divider"></div>
            <button id="btn-save" class="tool-btn save-btn" title="Save to room">SAVE</button>
            <button id="btn-load" class="tool-btn load-btn" title="Load a room">LOAD</button>
        </div>

        <div class="zoom-container">
            <input type="range" id="zoom-slider" min="0.1" max="3" step="0.1" value="1" orient="vertical">
        </div>
    </div>

    <div id="viewport">
        <div id="canvas">
            <svg id="svg-layer"></svg>
            <div id="notes-container"></div>
        </div>
    </div>

    <!-- Load Modal -->
    <div id="load-modal" class="modal-overlay">
        <div class="modal-box">
            <h3>Load Room</h3>
            <input id="load-room-input" type="text" placeholder="Room name" autocomplete="off">
            <p id="load-error" class="modal-error"></p>
            <div class="modal-row">
                <button id="btn-do-load" class="btn-primary">Load</button>
                <button id="btn-cancel-load" class="btn-secondary">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Save Modal -->
    <div id="save-modal" class="modal-overlay">
        <div class="modal-box">
            <h3>Save to Room</h3>
            <input id="save-room-input" type="text" placeholder="Room name" autocomplete="off">
            <input id="save-pw-input" type="password" placeholder="Password (optional)" autocomplete="new-password">
            <p id="save-error" class="modal-error"></p>
            <div class="modal-row">
                <button id="btn-do-save" class="btn-primary">Save</button>
                <button id="btn-cancel-save" class="btn-secondary">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Password Prompt Modal -->
    <div id="pw-modal" class="modal-overlay">
        <div class="modal-box">
            <h3>Room: #<span id="pw-room-name"></span></h3>
            <p style="margin:0; color:#64748b; font-size:0.9rem;">This room is password protected.</p>
            <input id="pw-input" type="password" placeholder="Enter password" autocomplete="off">
            <p id="pw-error" class="modal-error">Wrong password.</p>
            <div class="modal-row">
                <button id="btn-do-join" class="btn-primary">Join</button>
                <button id="btn-cancel-join" class="btn-secondary">Cancel</button>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
