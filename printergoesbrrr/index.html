<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Central Bank Simulator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Header -->
<header id="header">
  <h1>Central Bank Simulator</h1>
  <span id="phase-display">Rate Setting</span>
  <div class="header-stat">
    <strong id="round-display">Round 1 / 5</strong>
  </div>
  <div class="header-stat">
    <strong id="cb-rate-display">CB Rate: 0%</strong>
  </div>
  <div class="header-stat">
    <strong id="pot-display">Consumer Pot: 1500</strong>
  </div>
</header>

<!-- Main layout -->
<div id="app">

  <!-- LEFT: Bank panels -->
  <div id="left-col">
    <div id="bank-panels"></div>
  </div>

  <!-- CENTER: SVG + producer table + event log -->
  <div id="center-col">

    <div id="svg-wrap">
      <svg id="flow-svg" viewBox="0 0 720 270" preserveAspectRatio="xMidYMid meet"></svg>
    </div>

    <div id="center-bottom">

      <div id="producer-section">
        <div id="producer-table"></div>
      </div>

      <div id="event-log-section">
        <h3>Event Log</h3>
        <div id="event-log"></div>
      </div>

    </div>

    <!-- Advance button pinned to bottom of center col -->
    <div id="advance-btn-wrap">
      <button id="advance-btn">Begin Lending Phase →</button>
    </div>

  </div>

  <!-- RIGHT: Money supply + controls + debrief -->
  <div id="right-col">

    <div id="money-panel"></div>

    <div id="controls-panel">
      <h3>Central Bank Controls</h3>
      <div class="cb-rate-row">
        <span style="font-size:10px;color:var(--muted)">0%</span>
        <input id="cb-rate-slider" type="range" min="0" max="20" step="5" value="0">
        <span style="font-size:10px;color:var(--muted)">20%</span>
        <span id="cb-rate-value">0%</span>
      </div>
      <div id="cb-rate-hint"></div>
      <div class="speed-row">
        Speed:
        <select id="speed-select">
          <option value="0.5">Slow</option>
          <option value="1" selected>Normal</option>
          <option value="2">Fast</option>
          <option value="4">Very fast</option>
        </select>
      </div>
    </div>

    <div id="debrief-panel"></div>

  </div>

</div>

<script src="js/engine.js"></script>
<script src="js/main.js"></script>
</body>
</html>
