<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/jpeg" href="/unisamicon.jpg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EconNews — UniSam</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="page">

    <a class="back-link" href="/">← UniSam</a>

    <div class="masthead">
      <div class="masthead-icon-ring">
        <img src="/unisamicon.jpg" alt="UniSam">
      </div>
      <div class="masthead-text">
        <h1>EconNews</h1>
        <p class="tagline">Economics &amp; business for IB students &nbsp;·&nbsp; Mon / Wed / Fri</p>
      </div>
    </div>

    <div class="rainbow-line"></div>

    <div id="content">
      <p class="empty-state">Loading…</p>
    </div>

    <footer>
      Curated by Claude Haiku &nbsp;·&nbsp; unisam.nz
    </footer>

  </div>

  <script>
    function formatDate(str) {
      const [y, m, d] = str.split('-').map(Number);
      return new Date(y, m - 1, d).toLocaleDateString('en-GB', {
        day: 'numeric', month: 'short', year: 'numeric'
      });
    }

    async function fetchArticleTitles(filename) {
      try {
        const res = await fetch(`posts/${filename}`);
        if (!res.ok) return [];
        const html = await res.text();
        const doc = new DOMParser().parseFromString(html, 'text/html');
        return Array.from(doc.querySelectorAll('.article-card h2 a'))
          .map(a => a.textContent.trim())
          .filter(Boolean);
      } catch (e) {
        return [];
      }
    }

    async function render() {
      const content = document.getElementById('content');
      try {
        const res = await fetch('posts.json');
        if (!res.ok) throw new Error();
        const posts = await res.json();

        if (!Array.isArray(posts) || posts.length === 0) {
          content.innerHTML = '<p class="empty-state">No posts yet — check back on Monday.</p>';
          return;
        }

        const latest  = posts[0];
        const recent  = posts.slice(1, 5);   // up to 4 older issues
        const archive = posts.slice(5);       // everything beyond

        // Fetch article titles for the hero card
        const titles = await fetchArticleTitles(latest.filename);
        const titlesHTML = titles.length
          ? titles.map(t => `<li>${t}</li>`).join('')
          : `<li style="font-style:italic;color:var(--text-light)">Read this issue</li>`;

        function olderCard(post) {
          return `
            <a class="older-card" href="posts/${post.filename}">
              <span class="older-date">${formatDate(post.date)}</span>
              <span class="older-title">${post.title}</span>
              <span class="older-arrow">›</span>
            </a>`;
        }

        let html = `
          <div class="hero-card">
            <div class="hero-card-meta">
              <span class="hero-label">Latest issue</span>
              <span class="hero-date">${formatDate(latest.date)}</span>
            </div>
            <hr class="hero-rule">
            <ul class="hero-titles">${titlesHTML}</ul>
            <a class="hero-read-link" href="posts/${latest.filename}">Read this issue →</a>
          </div>`;

        if (recent.length) {
          html += `<p class="section-label">Previous issues</p>
                   <div class="older-list">
                     ${recent.map(olderCard).join('')}
                   </div>`;
        }

        if (archive.length) {
          html += `
            <button class="archive-toggle" id="archive-btn"
                    onclick="toggleArchive()">Older issues ▾</button>
            <div class="archive-list older-list" id="archive-list">
              ${archive.map(olderCard).join('')}
            </div>`;
        }

        content.innerHTML = html;
      } catch (e) {
        content.innerHTML = '<p class="empty-state">Could not load posts.</p>';
      }
    }

    function toggleArchive() {
      const list = document.getElementById('archive-list');
      const btn  = document.getElementById('archive-btn');
      const open = list.classList.toggle('open');
      btn.textContent = open ? 'Older issues ▴' : 'Older issues ▾';
    }

    render();
  </script>

</body>
</html>
