<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/unisamicon2.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EconNews — UniSam</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="page">

    <a class="back-link" href="/">← UniSam</a>

    <header class="index-header">
      <h1>EconNews</h1>
      <p class="tagline">Economics and business news curated for IB students — five articles, real discussion questions, three times a week.</p>
    </header>

    <div class="rainbow-line"></div>

    <div id="post-list">
      <p class="empty-state">Loading…</p>
    </div>

    <footer>
      Published Monday · Wednesday · Friday &nbsp;·&nbsp; unisam.nz
    </footer>

  </div>

  <script>
    function formatDate(str) {
      // str is "YYYY-MM-DD" — parse as local date to avoid UTC offset issues
      const [y, m, d] = str.split('-').map(Number);
      const date = new Date(y, m - 1, d);
      return date.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    async function loadPosts() {
      const list = document.getElementById('post-list');
      try {
        const res = await fetch('posts.json');
        if (!res.ok) throw new Error('fetch failed');
        const posts = await res.json();

        if (!Array.isArray(posts) || posts.length === 0) {
          list.innerHTML = '<p class="empty-state">No posts yet — check back on Monday.</p>';
          return;
        }

        list.innerHTML = posts.map(post => `
          <a class="post-card" href="posts/${post.filename}">
            <span class="post-card-date">${formatDate(post.date)}</span>
            <span class="post-card-title">${post.title}</span>
            <span class="post-card-arrow">›</span>
          </a>
        `).join('');
      } catch (e) {
        list.innerHTML = '<p class="empty-state">Could not load posts.</p>';
      }
    }

    loadPosts();
  </script>

</body>
</html>
