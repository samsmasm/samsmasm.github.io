<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poverty & Growth | Samples</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #faf9f7;
      --surface: #ffffff;
      --border: #e5e3de;
      --text: #1a1917;
      --muted: #888480;
      --hint-color:   #3b82f6;
      --hint-bg:      #eff6ff;
      --hint-text:    #1e40af;
      --green-color:  #22c55e;
      --green-bg:     #f0fdf4;
      --green-text:   #15803d;
      --orange-color: #f97316;
      --orange-bg:    #fff7ed;
      --orange-text:  #c2410c;
      --red-color:    #ef4444;
      --red-bg:       #fef2f2;
      --red-text:     #b91c1c;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.75;
    }

    .site-nav {
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      font-size: 13px;
    }
    .site-nav a { color: var(--muted); text-decoration: none; }
    .site-nav a:hover { color: var(--text); }
    .breadcrumb { font-size: 12px; color: var(--muted); margin-top: 3px; }
    .breadcrumb span { margin: 0 4px; }

    .page-header {
      max-width: 700px;
      margin: 0 auto;
      padding: 36px 24px 20px;
    }
    .subject-tag {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }
    h1 {
      font-size: clamp(16px, 2.5vw, 20px);
      font-weight: 600;
      line-height: 1.45;
      font-style: italic;
    }

    .toolbar {
      max-width: 700px;
      margin: 0 auto 28px;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .toolbar-label {
      font-size: 11px;
      color: var(--muted);
      font-weight: 500;
      margin-right: 2px;
    }
    .lvl-btn {
      font-size: 12px;
      font-weight: 500;
      padding: 5px 11px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .lvl-btn:hover                { color: var(--text); border-color: #bbb; }
    .lvl-btn[data-lv="1"]:hover  { background: var(--hint-bg);   border-color: var(--hint-color);   color: var(--hint-text); }
    .lvl-btn[data-lv="2"]:hover  { background: var(--green-bg);  border-color: var(--green-color);  color: var(--green-text); }
    .lvl-btn[data-lv="3"]:hover  { background: var(--orange-bg); border-color: var(--orange-color); color: var(--orange-text); }
    .lvl-btn[data-lv="4"]:hover  { background: var(--red-bg);    border-color: var(--red-color);    color: var(--red-text); }

    .reveal-btn {
      margin-left: auto;
      font-size: 12px;
      font-weight: 600;
      padding: 5px 14px;
      border-radius: 6px;
      border: 1px solid var(--text);
      background: var(--text);
      color: #fff;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .reveal-btn:hover { opacity: 0.8; }

    .essay {
      max-width: 700px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }

    .para-block {
      margin-bottom: 36px;
      padding-left: 16px;
      border-left: 3px solid var(--border);
      transition: border-color 0.25s;
    }
    .para-block[data-level="1"] { border-left-color: var(--hint-color); }
    .para-block[data-level="2"] { border-left-color: var(--green-color); }
    .para-block[data-level="3"] { border-left-color: var(--orange-color); }
    .para-block[data-level="4"] { border-left-color: var(--red-color); }

    .para-meta {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 7px;
    }
    .para-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--muted);
      flex: 1;
    }
    .para-adv {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 9px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .para-adv:hover { color: var(--text); border-color: #aaa; }
    .para-adv:disabled { opacity: 0.3; cursor: default; }
    .para-reset {
      font-size: 12px;
      padding: 1px 6px;
      border: 1px solid transparent;
      background: none;
      color: var(--muted);
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.15s;
    }
    .para-reset:hover { border-color: var(--border); color: var(--text); }

    .level-content { display: none; }
    .level-content.active {
      display: block;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(3px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .para-text {
      font-size: 15px;
      line-height: 1.85;
    }
    .para-text.hint    { color: var(--hint-text); }
    .para-text.prompt  { color: var(--green-text); }
    .para-text.starters { color: var(--orange-text); }

    .starter-line { margin-bottom: 10px; }
    .starter-line:last-child { margin-bottom: 0; }

    .para-text ul { list-style: none; padding: 0; margin: 0; }
    .para-text ul li { padding-left: 16px; position: relative; margin-bottom: 8px; }
    .para-text ul li:last-child { margin-bottom: 0; }
    .para-text ul li::before { content: '·'; position: absolute; left: 0; opacity: 0.5; }

    .blank {
      display: inline-block;
      background: #ebe9e4;
      border-radius: 3px;
      padding: 0 6px;
      min-width: 44px;
      cursor: pointer;
      color: transparent;
      transition: background 0.15s;
      user-select: none;
      vertical-align: baseline;
      font-size: 15px;
    }
    .blank::after {
      content: '· · ·';
      color: #a8a49c;
      letter-spacing: 1px;
      font-size: 10px;
    }
    .blank:hover { background: #d4d1ca; }
    .blank:hover::after { color: #777; }

    .blank.partial {
      background: none;
      color: var(--text);
      font-weight: 500;
      padding: 0;
      min-width: 0;
      border-radius: 0;
      cursor: pointer;
    }
    .blank.partial::after { display: none; }

    .blank.revealed {
      background: none;
      color: inherit;
      font-weight: inherit;
      padding: 0;
      min-width: 0;
      border-radius: 0;
      cursor: default;
    }
    .blank.revealed::after { display: none; }

    .para-graph {
      margin: 16px 0 0;
      text-align: center;
    }
    .para-graph img {
      max-width: 100%;
      height: auto;
      border: 1px solid var(--border);
      border-radius: 6px;
    }
    .para-graph figcaption {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
      font-style: italic;
    }

    @media (max-width: 580px) {
      .page-header, .toolbar, .essay { padding-left: 16px; padding-right: 16px; }
      h1 { font-size: 15px; }
    }
  </style>
</head>
<body>

<nav class="site-nav">
  <a href="/samples/">Samples</a>
  <div class="breadcrumb">
    IB Economics <span>&#8250;</span> Macroeconomics <span>&#8250;</span> Poverty &amp; Development
  </div>
</nav>

<header class="page-header">
  <div class="subject-tag">IB Economics &middot; Paper 1 &middot; 15 marks</div>
  <h1>&#8220;Using real-world examples, evaluate the view that promoting economic growth is more effective than reducing income inequality as a strategy for reducing poverty.&#8221;</h1>
</header>

<div class="toolbar">
  <span class="toolbar-label">Show all as:</span>
  <button class="lvl-btn" data-lv="0" onclick="setAllLevels(0)">Hidden</button>
  <button class="lvl-btn" data-lv="1" onclick="setAllLevels(1)">Hints</button>
  <button class="lvl-btn" data-lv="2" onclick="setAllLevels(2)">Prompts</button>
  <button class="lvl-btn" data-lv="3" onclick="setAllLevels(3)">Starters</button>
  <button class="lvl-btn" data-lv="4" onclick="setAllLevels(4)">Blanks</button>
  <button class="reveal-btn" onclick="revealAll()">Reveal whole essay</button>
</div>

<main class="essay" id="essay"></main>

<script>
const ESSAY = [
  {
    label: "Introduction and definitions",
    hint: [
      "Define both forms of poverty precisely.",
      "Explain what determines which strategy is more effective.",
      "End with a nuanced thesis that addresses both sides - including the key insight that the binary is partly false."
    ],
    prompt: [
      "Define absolute poverty using the IB definition ($3 per day) and relative poverty (earning below 50% of median income).",
      "Explain that the optimal strategy depends on which form of poverty predominates and on existing income levels.",
      "Present a three-part thesis: (1) growth is more effective where absolute poverty dominates; (2) redistribution is more effective where relative poverty dominates; (3) the binary is partly false - redistribution through public goods can generate growth, and growth that bypasses the poorest does not reduce poverty."
    ],
    starters: [
      "Absolute poverty refers to…",
      "The most effective strategy for reducing poverty depends on…",
      "This essay argues that for low-income countries where absolute poverty is widespread…",
      "Importantly, the binary the question presents is partly false because…"
    ],
    text: "Absolute poverty refers to the condition of living below {the minimum income required to meet basic human needs}, defined by the IB as below $3 per day. Relative poverty refers to earning less than {50% of the median income} in a given society. The most effective strategy for reducing poverty depends on {which form predominates} and on the existing level of national income. This essay argues that for low-income countries where absolute poverty is widespread, {economic growth is the more effective and often the only viable strategy}. In higher-income countries where relative poverty and inequality are the primary concern, {redistribution becomes more effective}. Importantly, the binary the question presents is partly false: well-designed redistribution through public goods can itself {generate long-run growth}, and growth that fails to reach the poorest {may not reduce poverty at all}."
  },
  {
    label: "Argument for economic growth",
    hint: [
      "Explain why economic growth is the appropriate strategy for reducing poverty in low-income countries.",
      "Explain how that growth should be achieved - specifically, why it must be supply-side led rather than demand-driven."
    ],
    prompt: [
      "Explain why, in low-income countries with widespread absolute poverty, economic growth must be driven by an increase in long-run aggregate supply rather than aggregate demand.",
      "Reference your AD/AS diagram and explain why this distinction matters for poverty reduction.",
      "End with a sentence that links back to the question."
    ],
    starters: [
      "In countries with very low GDP per capita, redistribution alone cannot solve absolute poverty because…",
      "For growth to sustainably reduce poverty, governments must focus on shifting the long-run aggregate supply curve to the right, rather than stimulating aggregate demand, because…",
      "A policy that only increases aggregate demand risks…",
      "This means that for economic growth to be an effective strategy for reducing poverty, it must be…"
    ],
    graph: 'graph-ad-as.svg',
    graphCaption: 'Neoclassical AD/AS model: rightward shift of LRAS and SRAS drives higher output (Y₁ to Y₂) and a lower price level (P₁ to P₂).',
    text: "In countries with very low GDP per capita, redistribution cannot by itself solve absolute poverty. Where national income is so limited that even a perfectly equal distribution would leave most citizens below {$3 per day}, the priority must be {expanding the economy}. In a neoclassical AD/AS framework, sustainable long-run growth requires a rightward shift of {the long-run aggregate supply curve (LRAS)}, driven by improvements in {the quantity and quality of factors of production}. This is different from simply increasing aggregate demand, which only {raises the price level without increasing long-run output}. Policies that merely stimulate aggregate demand risk {inflationary pressure} without expanding {productive capacity}. In terms of the diagram, we would show this as {a rightward shift of LRAS} rather than {a rightward shift of AD}. For poverty reduction to be durable, growth must therefore be {supply-side led}, meaning it actually increases the productive capacity of the economy rather than just {stimulating demand}."
  },
  {
    label: "Case study: Vietnam’s Doi Moi reforms",
    hint: [
      "Apply the LRAS framework to a specific country.",
      "Use precise statistics to show how supply-side led growth reduced absolute poverty dramatically.",
      "This is your main empirical evidence."
    ],
    prompt: [
      "Describe Vietnam’s Doi Moi reforms (late 1980s) as a concrete illustration of supply-side led growth: FDI liberalisation and export-oriented manufacturing drove a rightward shift of LRAS.",
      "Use specific data - GDP per capita rose from under $100 in 1990 to over $4,000 by the early 2020s; absolute poverty fell from over 70% to under 5% over three decades (World Bank).",
      "Conclude by making explicit why this supports the case for growth: without the expansion of national income, redistribution would have had nothing to work with."
    ],
    starters: [
      "Vietnam’s Doi Moi reforms from the late 1980s illustrate this by…",
      "As a result of these supply-side reforms, real GDP per capita rose from…",
      "The World Bank estimates that the share of the population in absolute poverty…",
      "This case supports the priority of growth because…"
    ],
    text: "Vietnam illustrates this powerfully. The Doi Moi reforms from the late 1980s opened the economy to {foreign direct investment} and expanded {export-oriented manufacturing}, shifting LRAS significantly outward. Real GDP per capita rose from {under $100 in 1990} to {over $4,000 by the early 2020s}, and the World Bank estimates that the share of the population in absolute poverty fell from {over 70% to under 5%} over roughly three decades. Without this expansion of national income, there would have been {insufficient wealth to redistribute} in any meaningful way."
  },
  {
    label: "Complication: redistribution can reinforce growth",
    hint: [
      "Qualify your case study.",
      "Explain that Vietnam’s poverty reduction came partly from public goods investment - and that this challenges the question’s either/or framing."
    ],
    prompt: [
      "Argue that Vietnam’s success was not purely market-led: state investment in rural infrastructure, internet connectivity (via SOEs), education, and healthcare simultaneously reduced inequality of access and functioned as supply-side policies - raising human capital and connectivity in poorer regions, shifting LRAS further outward.",
      "Frame this explicitly: redistribution channelled through public goods is not the opposite of growth, it generates growth.",
      "This challenges the binary the question implies."
    ],
    starters: [
      "However, Vietnam’s experience also challenges the either/or framing of the question because…",
      "These public goods investments reduced inequality of access while simultaneously…",
      "This demonstrates that redistribution channelled through public goods is not the opposite of growth…",
      "The most effective approach in Vietnam was therefore not to choose between growth and redistribution, but to…"
    ],
    text: "However, Vietnam’s experience also challenges the either/or framing of the question. A significant part of its poverty reduction came not from {cash transfers} but from state investment in {public goods}: rural infrastructure, affordable internet connectivity through state-owned enterprises, education, and basic healthcare. These investments reduced {inequality of access} while simultaneously functioning as {supply-side policies}, raising human capital and connectivity in poorer regions and shifting LRAS further outward over time. Growth and redistribution, in this model, {reinforced each other}."
  },
  {
    label: "Counter-argument: growth without redistribution fails",
    hint: [
      "Present the strongest evidence that growth alone is not sufficient.",
      "Use a high-income country where persistent poverty coexists with high GDP per capita, and explain the mechanism."
    ],
    prompt: [
      "Use the United States to show that growth does not automatically reduce poverty where redistribution is weak.",
      "Reference the Gini coefficient (among the highest in the OECD) as evidence of inequality.",
      "Explain the mechanism: limited public healthcare, uneven education quality, and low minimum wages mean growth gains accrue to higher-income groups.",
      "Connect this to your thesis: in this context, redistribution is the more direct tool."
    ],
    starters: [
      "A further important qualification is that growth does not automatically reduce poverty if…",
      "Despite one of the highest GDP per capita figures in the world, the United States…",
      "Its Gini coefficient is among the highest in the OECD, suggesting that…",
      "In this context, redistribution would be the more direct and effective instrument because…"
    ],
    text: "A further important qualification is that growth does not automatically reduce poverty if gains are {captured disproportionately by high-income households} or capital owners. The United States illustrates this clearly. Despite one of the {highest GDP per capita figures in the world}, the US has persistently high levels of both relative and absolute poverty by the standards of comparable economies. Its Gini coefficient is {among the highest in the OECD}. Weak redistribution mechanisms - including {limited public healthcare, uneven education quality, and low minimum wages} - mean that decades of economic growth have not translated into {commensurate poverty reduction} for the lowest income groups. Here, redistribution would be the more direct and effective instrument."
  },
  {
    label: "Evaluation and conclusion",
    hint: [
      "Deliver a qualified verdict that directly answers the question.",
      "Reference both case studies.",
      "Specify what determines when each strategy is more effective - evaluate, don't just summarise."
    ],
    prompt: [
      "State your verdict directly: growth is largely the more effective strategy, but this requires significant qualification.",
      "Argue: (1) for low-income countries with absolute poverty, growth is a prerequisite - Vietnam proves this; (2) growth alone is insufficient - the US proves this; (3) redistribution through public goods generates growth; (4) the appropriate balance depends on stage of development.",
      "Make the conditional claim explicit."
    ],
    starters: [
      "In conclusion, the view that promoting economic growth is more effective than redistribution is largely correct, but…",
      "For low-income countries facing widespread absolute poverty, growth is a prerequisite because…",
      "However, growth alone is neither sufficient nor automatic, as…",
      "The appropriate balance therefore depends on the stage of development: growth must come first where…"
    ],
    text: "In conclusion, the view that promoting economic growth is more effective than redistribution is {largely correct, but requires significant qualification}. For low-income countries facing widespread absolute poverty, growth is a prerequisite since there is simply {not enough national income to redistribute}. Vietnam’s trajectory over three decades provides {compelling evidence} for this. However, growth alone is {neither sufficient nor automatic}, as the US case demonstrates. The most effective approach combines {supply-side growth with redistribution channelled through public goods investment}, recognising that in the long run the two strategies are complementary. The appropriate balance depends on the stage of development: growth must come first where {absolute poverty dominates}, but redistribution becomes the more effective lever once a country has reached a level of income where {inequality rather than scarcity} is the binding constraint on poverty reduction."
  }
];

const MAX_LEVEL = 4;
const ADV_LABELS = ['Show hint', 'Show prompt', 'Show starters', 'Show blanks', 'Done'];

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function buildBlanks(text, paraIdx) {
  const parts = text.split(/\{([^}]+)\}/);
  let html = '', bi = 0;
  for (let i = 0; i < parts.length; i++) {
    if (i % 2 === 0) {
      html += esc(parts[i]);
    } else {
      const words = parts[i].split(' ');
      html += '<span class="blank" data-para="' + paraIdx + '" data-blank="' + bi + '" data-words="' + encodeURIComponent(parts[i]) + '" data-total="' + words.length + '" data-revealed="0" onclick="revealWord(this)" title="Click to reveal">   </span>';
      bi++;
    }
  }
  return html;
}

function revealWord(el) {
  const words = decodeURIComponent(el.dataset.words).split(' ');
  let revealed = parseInt(el.dataset.revealed);
  if (revealed >= words.length) return;
  revealed++;
  el.dataset.revealed = revealed;
  const partial = words.slice(0, revealed).join(' ');
  if (revealed < words.length) {
    el.textContent = partial + '…';
    el.classList.add('partial');
    el.classList.remove('revealed');
  } else {
    el.textContent = partial;
    el.classList.remove('partial');
    el.classList.add('revealed');
    el.onclick = null;
  }
}

function renderBlock(para, idx) {
  const div = document.createElement('div');
  div.className = 'para-block';
  div.dataset.level = 0;
  div.dataset.idx = idx;

  const startersHtml = para.starters.map(function(s) {
    return '<div class="starter-line">' + esc(s) + '</div>';
  }).join('');

  div.innerHTML =
    '<div class="para-meta">' +
      '<span class="para-label">' + esc(para.label) + '</span>' +
      '<button class="para-reset" onclick="resetPara(' + idx + ')" title="Reset">↺</button>' +
      '<button class="para-adv" id="adv-' + idx + '" onclick="advancePara(' + idx + ')">Show hint</button>' +
    '</div>' +
    '<div class="level-content" id="lc-' + idx + '-1"><ul class="para-text hint">' + para.hint.map(function(h){return '<li>'+esc(h)+'</li>';}).join('') + '</ul></div>' +
    '<div class="level-content" id="lc-' + idx + '-2"><ul class="para-text prompt">' + para.prompt.map(function(h){return '<li>'+esc(h)+'</li>';}).join('') + '</ul></div>' +
    '<div class="level-content" id="lc-' + idx + '-3"><div class="para-text starters">' + startersHtml + '</div></div>' +
    '<div class="level-content" id="lc-' + idx + '-4"><p class="para-text">' + buildBlanks(para.text, idx) + '</p>' +
    (para.graph ? '<figure class="para-graph"><img src="' + para.graph + '" alt="AD/AS diagram"><figcaption>' + esc(para.graphCaption || '') + '</figcaption></figure>' : '') +
    '</div>';

  return div;
}

function getBlock(idx) {
  return document.querySelector('.para-block[data-idx="' + idx + '"]');
}

function setLevel(idx, level) {
  const block = getBlock(idx);
  if (!block) return;
  block.dataset.level = level;
  for (var l = 1; l <= MAX_LEVEL; l++) {
    var el = document.getElementById('lc-' + idx + '-' + l);
    if (el) el.classList.toggle('active', l === level);
  }
  var btn = document.getElementById('adv-' + idx);
  btn.textContent = ADV_LABELS[level];
  btn.disabled = (level === MAX_LEVEL);
  if (level === 0) resetBlanks(idx);
}

function resetBlanks(idx) {
  document.querySelectorAll('.blank[data-para="' + idx + '"]').forEach(function(b) {
    b.dataset.revealed = 0;
    b.textContent = '   ';
    b.classList.remove('partial', 'revealed');
    b.onclick = function() { revealWord(this); };
  });
}

function advancePara(idx) {
  var block = getBlock(idx);
  var level = parseInt(block.dataset.level);
  if (level < MAX_LEVEL) setLevel(idx, level + 1);
}

function resetPara(idx) { setLevel(idx, 0); }

function setAllLevels(level) {
  ESSAY.forEach(function(_, idx) { setLevel(idx, level); });
}

function revealAll() {
  ESSAY.forEach(function(para, idx) {
    setLevel(idx, MAX_LEVEL);
    document.querySelectorAll('.blank[data-para="' + idx + '"]').forEach(function(b) {
      var words = decodeURIComponent(b.dataset.words).split(' ');
      b.dataset.revealed = words.length;
      b.textContent = words.join(' ');
      b.classList.remove('partial');
      b.classList.add('revealed');
      b.onclick = null;
    });
  });
}

var container = document.getElementById('essay');
ESSAY.forEach(function(para, idx) { container.appendChild(renderBlock(para, idx)); });
</script>
</body>
</html>
