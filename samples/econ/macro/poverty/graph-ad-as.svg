<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 400" width="520" height="400"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">

  <rect width="520" height="400" fill="white"/>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
  </defs>

  <!-- Axes -->
  <line x1="70" y1="340" x2="468" y2="340" stroke="#333" stroke-width="1.5"/>
  <line x1="70" y1="30"  x2="70"  y2="340" stroke="#333" stroke-width="1.5"/>
  <polygon points="464,336 464,344 474,340" fill="#333"/>
  <polygon points="66,34 74,34 70,24" fill="#333"/>

  <!-- Axis letter labels -->
  <text x="477" y="344" font-size="14" fill="#333" font-weight="600">Y</text>
  <text x="56"  y="22"  font-size="14" fill="#333" font-weight="600">P</text>

  <!-- Axis title labels -->
  <text x="265" y="385" font-size="12" fill="#666" text-anchor="middle">Real Output (Y)</text>
  <text x="15"  y="190" font-size="12" fill="#666" text-anchor="middle" transform="rotate(-90,15,190)">Price Level (P)</text>

  <!--
    Graph coordinate space: gX in [0, 460], gY in [0, 350]
    SVG_x = 70 + gX * 0.8370     (plot width 385, gX range 460)
    SVG_y = 340 - gY * 0.8857    (plot height 310, gY range 350, y-flipped)

    Curves:
      AD:    P = 318.3 - 0.583*Y   (downward sloping)
      SRAS1: P =  48   + 0.9*Y     (upward sloping, original)
      SRAS2: P = -99.8 + 0.9*Y     (shifted right by ~145 units)
      LRAS1: vertical at gX = 182  (SVG x = 222)
      LRAS2: vertical at gX = 282  (SVG x = 306)

    Equilibria:
      E1 = (182, 212) in graph coords -> SVG (222, 152)
      E2 = (282, 154) in graph coords -> SVG (306, 204)
  -->

  <!-- LRAS1: solid green vertical at SVG x=222 -->
  <line x1="222" y1="35" x2="222" y2="340" stroke="#2d8b57" stroke-width="2"/>
  <text x="222" y="30" font-size="12" fill="#2d8b57" text-anchor="middle" font-weight="600">LRAS&#x2081;</text>

  <!-- LRAS2: dashed green vertical at SVG x=306 -->
  <line x1="306" y1="35" x2="306" y2="340" stroke="#2d8b57" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="306" y="30" font-size="12" fill="#2d8b57" text-anchor="middle" font-weight="600">LRAS&#x2082;</text>

  <!-- SRAS1: solid red, (70,298) to (342,30) -->
  <line x1="70" y1="298" x2="342" y2="30" stroke="#b91c1c" stroke-width="2"/>
  <text x="347" y="27" font-size="12" fill="#b91c1c" font-weight="600">SRAS&#x2081;</text>

  <!-- SRAS2: dashed red, (163,340) to (455,62) -->
  <line x1="163" y1="340" x2="455" y2="62" stroke="#b91c1c" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="458" y="59" font-size="12" fill="#b91c1c" font-weight="600">SRAS&#x2082;</text>

  <!-- AD: solid dark blue, (70,58) to (455,296) -->
  <line x1="70" y1="58" x2="455" y2="296" stroke="#1e3a8a" stroke-width="2"/>
  <text x="458" y="299" font-size="12" fill="#1e3a8a" font-weight="600">AD</text>

  <!-- Dashed horizontal reference lines to P-axis -->
  <line x1="70" y1="152" x2="222" y2="152" stroke="#bbb" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="70" y1="204" x2="306" y2="204" stroke="#bbb" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Tick marks on axes -->
  <line x1="222" y1="340" x2="222" y2="349" stroke="#333" stroke-width="1.5"/>
  <line x1="306" y1="340" x2="306" y2="349" stroke="#333" stroke-width="1.5"/>
  <line x1="70"  y1="152" x2="61"  y2="152" stroke="#333" stroke-width="1.5"/>
  <line x1="70"  y1="204" x2="61"  y2="204" stroke="#333" stroke-width="1.5"/>

  <!-- Axis value labels -->
  <text x="222" y="362" font-size="12" fill="#333" text-anchor="middle">Y&#x2081;</text>
  <text x="306" y="362" font-size="12" fill="#333" text-anchor="middle">Y&#x2082;</text>
  <text x="57"  y="156" font-size="12" fill="#333" text-anchor="end">P&#x2081;</text>
  <text x="57"  y="208" font-size="12" fill="#333" text-anchor="end">P&#x2082;</text>

  <!-- Shift arrow between LRAS1 and LRAS2 -->
  <line x1="232" y1="275" x2="295" y2="275" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Equilibrium dots -->
  <circle cx="222" cy="152" r="4.5" fill="#1a1917" stroke="white" stroke-width="1.5"/>
  <text x="212" y="144" font-size="12" fill="#1a1917" text-anchor="end">E&#x2081;</text>

  <circle cx="306" cy="204" r="4.5" fill="#1a1917" stroke="white" stroke-width="1.5"/>
  <text x="318" y="200" font-size="12" fill="#1a1917">E&#x2082;</text>

</svg>
