<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RatIBro — IB Finance Revision</title>
  <link rel="icon" type="image/png" href="ratibrosm.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="login-page">
  <div class="login-brand">
    <img src="ratibromed.png" alt="RatIBro mascot" class="login-mascot">
    <div class="login-brand-title">Rat<span class="logo-ib">IB</span>ro</div>
    <div class="login-brand-tagline">Master IB Finance, one ratio at a time.</div>
  </div>

  <div class="login-form-container">
    <form class="login-form" id="login-form" onsubmit="handleLogin(event)">
      <div class="login-form-title">Welcome back</div>
      <div class="login-form-sub" id="login-form-sub">Sign in to continue your revision.</div>

      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter your username" autocomplete="username" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required>
      </div>

      <button type="submit" class="btn-primary">Log in</button>
      <div class="login-error" id="login-error"></div>
    </form>
  </div>
</div>

<script src="js/app.js"></script>
<script>
  initTheme();

  // If already logged in, show a continue link rather than auto-redirecting
  const existingUser = getCurrentUser();
  if (existingUser) {
    const sub = document.getElementById('login-form-sub');
    sub.innerHTML = `Already signed in as <strong>${existingUser.username}</strong>. <a href="dashboard.html" style="color:var(--primary);font-weight:800;">Go to dashboard →</a>`;
  }

  function handleLogin(e) {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const errorEl = document.getElementById('login-error');

    if (login(username, password)) {
      window.location.href = 'dashboard.html';
    } else {
      errorEl.textContent = 'Incorrect username or password.';
    }
  }
</script>
</body>
</html>
