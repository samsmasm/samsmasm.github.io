<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Statements — RatIBro</title>
  <link rel="icon" type="image/svg+xml" href="ratibroicon2sm.svg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-shell">
  <div id="sidebar-container"></div>

  <main class="main-content">
    <div class="coming-soon">
      <div class="coming-soon-emoji">📊</div>
      <h2>Statements Practice</h2>
      <p>
        Procedurally generated financial statements — Statement of Profit or Loss,
        Statement of Financial Position, and Cash Flow Forecast — coming soon.<br><br>
        Two modes: fill in figures given the structure, or build from scratch.
      </p>
    </div>
  </main>
</div>

<script src="js/app.js"></script>
<script type="module">
  import { onAuthChange, logoutUser, getDisplayName, isTeacher } from './js/firebase.js';
  initTheme();
  onAuthChange(user => {
    if (!user) { window.location.replace('index.html'); return; }
    document.getElementById('sidebar-container').innerHTML =
      buildSidebar('statements', getDisplayName(user), isTeacher(user));
    updateThemeToggle();
    document.getElementById('logout-btn').addEventListener('click', logoutUser);
  });
</script>
</body>
</html>
