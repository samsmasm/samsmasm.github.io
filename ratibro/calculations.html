<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculations | RatIBro</title>
  <link rel="icon" type="image/png" href="ratibroicon2sm.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-shell">
  <div id="sidebar-container"></div>

  <main class="main-content">
    <!-- Setup screen -->
    <div id="setup-screen" class="practice-setup">
      <div class="page-title">Calculations</div>
      <div class="practice-desc">
        You'll be given a set of figures. Work out the answer by hand, then reveal and self-rate.
      </div>
      <div class="count-label">Ask me this many:</div>
      <div class="count-picker">
        <button class="count-btn" onclick="selectCount(3)">3</button>
        <button class="count-btn" onclick="selectCount(5)">5</button>
        <button class="count-btn selected" onclick="selectCount(10)">10</button>
      </div>
      <div class="mode-picker">
        <button class="mode-btn selected" id="mode-just" onclick="selectMode('just')">Just the numbers</button>
        <button class="mode-btn" id="mode-hunt" onclick="selectMode('hunt')">Make me hunt</button>
      </div>
      <button class="btn-primary" onclick="startSession()">Start session</button>
      <br><button class="btn-help" onclick="showHelp(CALCULATIONS_HELP)">? Help</button>
    </div>

    <!-- Session screen -->
    <div id="session-screen" class="hidden">
      <div class="def-session">
        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
        </div>

        <div class="calc-question-card" id="calc-card">
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px;">
            <div class="calc-formula-name" id="calc-name"></div>
            <span class="text-muted" style="font-size:0.8rem;font-weight:700;flex-shrink:0;margin-left:12px;" id="calc-counter"></span>
          </div>

          <div class="calc-inputs" id="calc-inputs"></div>

          <div class="calc-answer-input-wrap">
            <span class="calc-answer-label">Your answer:</span>
            <input type="text" class="calc-answer-input" id="calc-answer-input" placeholder="e.g. 42.50%" autocomplete="off" inputmode="decimal">
          </div>
          <div class="calc-check-result hidden" id="calc-check-result"></div>

          <div class="def-actions">
            <button class="btn-secondary" onclick="skipCalc()">Skip</button>
            <button class="btn-secondary btn-reveal" id="calc-reveal-btn" onclick="revealCalcAnswer()">Reveal answer</button>
          </div>

          <div class="formula-peek-wrap" id="formula-peek-wrap">
            <div class="calc-formula-str" id="calc-formula"></div>
            <div class="formula-peek-cover" id="formula-peek-cover">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              Hold to peek at formula
            </div>
          </div>

          <div class="calc-correct-answer" id="calc-correct-answer">
            <div class="calc-correct-label">Correct answer</div>
            <div class="calc-correct-value" id="calc-correct-value"></div>
          </div>
        </div>

        <div class="rating-panel" id="rating-panel">
          <div class="rating-panel-q">How did you do?</div>
          <div class="rating-options">
            <button class="rating-option" data-r="1" onclick="submitRating(1)">
              <span class="rating-emoji">😬</span>
              Don't know it
            </button>
            <button class="rating-option" data-r="2" onclick="submitRating(2)">
              <span class="rating-emoji">🤔</span>
              Shaky
            </button>
            <button class="rating-option" data-r="3" onclick="submitRating(3)">
              <span class="rating-emoji">😊</span>
              Getting there
            </button>
            <button class="rating-option" data-r="4" onclick="submitRating(4)">
              <span class="rating-emoji">🎉</span>
              Got it
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Summary screen -->
    <div id="summary-screen" class="hidden">
      <div class="session-summary">
        <div class="summary-title">Session complete!</div>
        <div class="summary-sub" id="summary-sub"></div>
        <div class="summary-bars" id="summary-bars"></div>
        <div class="summary-actions">
          <button class="btn-outline" onclick="window.location.href='dashboard.html'">View dashboard</button>
          <button class="btn-primary" style="padding:11px 24px;width:auto;" onclick="restartSetup()">Go again</button>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="js/app.js"></script>
<script src="js/data.js"></script>
<script type="module">
  import { onAuthChange, logoutUser, getDisplayName, isTeacher, recordAttempt } from './js/firebase.js';

  initTheme();

  let currentUser = null;

  onAuthChange(user => {
    if (!user) { window.location.replace('index.html'); return; }
    currentUser = user;
    document.getElementById('sidebar-container').innerHTML =
      buildSidebar('calculations', getDisplayName(user), isTeacher(user));
    updateThemeToggle();
    document.getElementById('logout-btn').addEventListener('click', logoutUser);
  });

  let selectedCount = 10;
  let huntMode = false;
  let sessionQuestions = [];
  let currentIndex = 0;
  let sessionResults = [];

  const FORMULA_KEYS = Object.keys(FORMULAS);

  window.selectMode = function(mode) {
    huntMode = mode === 'hunt';
    document.getElementById('mode-just').classList.toggle('selected', !huntMode);
    document.getElementById('mode-hunt').classList.toggle('selected', huntMode);
  };

  const DECOY_POOL = ['grossProfit','salesRevenue','pbit','capitalEmployed',
    'currentAssets','currentLiabilities','stock','costOfSales',
    'avgStock','debtors','creditors','nonCurrentLiabilities','totalReturns'];

  function generateDecoys(q) {
    const realKeys = new Set(q.formula.inputs);
    const pool = DECOY_POOL.filter(k => !realKeys.has(k));
    const count = 2 + Math.floor(Math.random() * 2); // 2 or 3 decoys
    const picked = [...pool].sort(() => Math.random() - 0.5).slice(0, count);
    const realMonetary = Object.entries(q.values)
      .filter(([k]) => k !== 'yearsOfUse').map(([, v]) => v);
    const base = realMonetary[Math.floor(Math.random() * realMonetary.length)] || 200000;
    const result = {};
    picked.forEach(key => {
      const factor = 0.3 + Math.random() * 1.2;
      result[key] = Math.round(base * factor / 25000) * 25000;
    });
    return result;
  }

  // Formula peek interaction — set up once, works for all questions
  (function setupPeek() {
    const wrap = document.getElementById('formula-peek-wrap');
    const cover = document.getElementById('formula-peek-cover');
    function startPeek(e) { e.preventDefault(); wrap.classList.add('peeking'); }
    function endPeek() { wrap.classList.remove('peeking'); }
    cover.addEventListener('mousedown', startPeek);
    cover.addEventListener('touchstart', startPeek, { passive: false });
    document.addEventListener('mouseup', endPeek);
    document.addEventListener('touchend', endPeek);
  })();

  window.selectCount = function(n) {
    selectedCount = n;
    document.querySelectorAll('.count-btn').forEach(btn => {
      btn.classList.toggle('selected', parseInt(btn.textContent) === n);
    });
  }

  function pickQuestions(count) {
    const shuffled = [...FORMULA_KEYS].sort(() => Math.random() - 0.5);
    return shuffled.slice(0, Math.min(count, shuffled.length))
      .map(key => generateCalcQuestion(key));
  }

  window.startSession = function() {
    sessionQuestions = pickQuestions(selectedCount);
    currentIndex = 0;
    sessionResults = [];
    document.getElementById('setup-screen').classList.add('hidden');
    document.getElementById('session-screen').classList.remove('hidden');
    loadQuestion();
  }

  function fmt(n) {
    // Format as integer if whole, else 2dp
    return Number.isInteger(n) ? n.toLocaleString() : n.toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 2 });
  }

  const UNIT_PLACEHOLDERS = { '%': 'e.g. 42.50%', ':1': 'e.g. 1.25:1', ' days': 'e.g. 42.50 days', ' times': 'e.g. 2.50 times' };

  function loadQuestion() {
    const q = sessionQuestions[currentIndex];
    const total = sessionQuestions.length;

    document.getElementById('progress-fill').style.width = (currentIndex / total * 100) + '%';
    document.getElementById('calc-counter').textContent = `${currentIndex + 1} / ${total}`;
    document.getElementById('calc-name').textContent = q.formula.name;
    document.getElementById('calc-formula').textContent = q.formula.formula;
    const answerInput = document.getElementById('calc-answer-input');
    answerInput.value = '';
    answerInput.disabled = false;
    answerInput.placeholder = UNIT_PLACEHOLDERS[q.formula.unit] || 'e.g. 42.50';
    document.getElementById('calc-correct-answer').classList.remove('visible');
    document.getElementById('rating-panel').classList.remove('visible');
    document.getElementById('calc-reveal-btn').disabled = false;
    const checkEl = document.getElementById('calc-check-result');
    checkEl.className = 'calc-check-result hidden';
    checkEl.innerHTML = '';
    document.getElementById('formula-peek-wrap').classList.remove('peeking');

    let displayEntries = q.formula.inputs.map(k => [k, q.values[k]]);
    if (huntMode) {
      const decoys = generateDecoys(q);
      displayEntries = [...displayEntries, ...Object.entries(decoys)]
        .sort(() => Math.random() - 0.5);
    }
    document.getElementById('calc-inputs').innerHTML = displayEntries.map(([key, val]) => {
      const display = key === 'yearsOfUse' ? fmt(val) + ' years' : '$' + fmt(val);
      return `<div class="calc-input-row">
        <div class="calc-input-label">${INPUT_LABELS[key]}</div>
        <div class="calc-input-value">${display}</div>
      </div>`;
    }).join('');
  }

  function checkStudentAnswer(q) {
    const raw = document.getElementById('calc-answer-input').value.trim();
    if (!raw) return { status: 'empty' };

    const unit = q.formula.unit;
    const lower = raw.toLowerCase().replace(/\s+/g, '');

    let hasUnit = false;
    let numStr = raw;

    if (unit === '%') {
      hasUnit = lower.endsWith('%');
      numStr = raw.replace(/%/g, '').trim();
    } else if (unit === ':1') {
      hasUnit = lower.includes(':1');
      numStr = raw.replace(/:1/gi, '').trim();
    } else if (unit === ' days') {
      hasUnit = lower.endsWith('days');
      numStr = raw.toLowerCase().replace('days', '').trim();
    } else if (unit === ' times') {
      hasUnit = lower.endsWith('times');
      numStr = raw.toLowerCase().replace('times', '').trim();
    }

    if (!hasUnit) return { status: 'no-unit' };

    const studentNum = parseFloat(numStr);
    if (isNaN(studentNum)) return { status: 'invalid' };

    const correct2dp = Math.round(q.answer * 100) / 100;
    const student2dp = Math.round(studentNum * 100) / 100;
    return student2dp === correct2dp ? { status: 'correct' } : { status: 'wrong' };
  }

  function displayCheckResult(q) {
    const result = checkStudentAnswer(q);
    const el = document.getElementById('calc-check-result');
    const unitExamples = { '%': '%', ':1': ':1', ' days': 'days', ' times': 'times' };
    const unitExample = unitExamples[q.formula.unit] || '';

    el.classList.remove('hidden');
    if (result.status === 'empty') {
      el.className = 'calc-check-result hidden';
      el.innerHTML = '';
    } else if (result.status === 'correct') {
      el.className = 'calc-check-result check-correct';
      el.innerHTML = '✓ Correct!';
    } else if (result.status === 'no-unit') {
      el.className = 'calc-check-result check-no-unit';
      el.innerHTML = `Include the unit, e.g. <strong>${unitExample}</strong>`;
    } else {
      el.className = 'calc-check-result check-wrong';
      el.innerHTML = '✗ Not quite - see correct answer below';
    }
  }

  window.revealCalcAnswer = function() {
    const q = sessionQuestions[currentIndex];
    const answer = q.answer;
    const unit = q.formula.unit;

    const display = unit === ':1' ? answer.toFixed(2) + ':1' : answer.toFixed(2) + unit;

    displayCheckResult(q);
    document.getElementById('calc-correct-value').textContent = display;
    document.getElementById('calc-correct-answer').classList.add('visible');
    document.getElementById('calc-answer-input').disabled = true;
    document.getElementById('calc-reveal-btn').disabled = true;
    document.getElementById('formula-peek-wrap').classList.add('peeking');
    document.getElementById('rating-panel').classList.add('visible');
  }

  window.skipCalc = function() {
    currentIndex++;
    if (currentIndex >= sessionQuestions.length) showSummary();
    else loadQuestion();
  }

  window.submitRating = async function(rating) {
    const q = sessionQuestions[currentIndex];
    const skillMap = {
      'gross-profit-margin': 'gross-profit-margin',
      'profit-margin': 'profit-margin',
      'roce': 'roce',
      'current-ratio': 'current-ratio',
      'acid-test': 'acid-test-ratio',
      'arr': 'arr',
      'stock-turnover-times': 'stock-turnover',
      'stock-turnover-days': 'stock-turnover',
      'debtor-days': 'debtor-days',
      'creditor-days': 'creditor-days',
      'gearing': 'gearing-ratio',
    };
    const skillId = skillMap[q.formulaKey];
    try {
      if (skillId && currentUser) await recordAttempt(currentUser.uid, skillId, rating);
    } catch(e) {
      console.warn('recordAttempt failed:', e);
    }
    sessionResults.push({ skillId, rating });

    currentIndex++;
    document.getElementById('progress-fill').style.width = (currentIndex / sessionQuestions.length * 100) + '%';
    if (currentIndex >= sessionQuestions.length) showSummary();
    else loadQuestion();
  }

  function showSummary() {
    document.getElementById('session-screen').classList.add('hidden');
    document.getElementById('summary-screen').classList.remove('hidden');

    const counts = { 1: 0, 2: 0, 3: 0, 4: 0 };
    sessionResults.forEach(r => counts[r.rating]++);
    const total = sessionResults.length;
    document.getElementById('summary-sub').textContent =
      `You worked through ${total} calculation${total !== 1 ? 's' : ''}.`;

    const maxCount = Math.max(...Object.values(counts), 1);
    const labels = { 1: "Don't know", 2: 'Shaky', 3: 'Getting there', 4: 'Got it' };
    const emojis = { 1: '😬', 2: '🤔', 3: '😊', 4: '🎉' };

    document.getElementById('summary-bars').innerHTML = [1, 2, 3, 4].map(r => {
      const h = Math.max((counts[r] / maxCount) * 100, counts[r] > 0 ? 12 : 4);
      return `
        <div class="summary-bar-col">
          <div class="summary-bar-fill" data-r="${r}" style="height:${h}px"></div>
          <div class="summary-bar-count">${emojis[r]} ${counts[r]}</div>
          <div class="summary-bar-label" data-r="${r}">${labels[r]}</div>
        </div>
      `;
    }).join('');
  }

  window.restartSetup = function() {
    document.getElementById('summary-screen').classList.add('hidden');
    document.getElementById('setup-screen').classList.remove('hidden');
  }

  const CALCULATIONS_HELP = `
    <h3>How to use Calculations</h3>
    <div class="help-item"><strong>Just the numbers</strong><span>Shows only the figures needed to answer the question.</span></div>
    <div class="help-item"><strong>Make me hunt</strong><span>Gives you the figures you need plus a few extra irrelevant ones mixed in. You have to decide which figures are relevant to the calculation.</span></div>
    <div class="help-item"><strong>Your answer box</strong><span>Type your answer including the unit, e.g. "42.50%" or "3.5:1" or "45 days". The app will check it for you when you reveal.</span></div>
    <div class="help-item"><strong>Hold to peek</strong><span>Tap and hold the grey bar below the buttons to briefly reveal the formula without showing the full answer.</span></div>
    <div class="help-item"><strong>Reveal answer</strong><span>Shows the correct answer with working. Rate yourself after reviewing it.</span></div>
    <div class="help-item"><strong>Rating buttons</strong><span>Your ratings are tracked on the dashboard so weaker topics come up more often. Be honest!</span></div>
  `;
</script>
</body>
</html>
