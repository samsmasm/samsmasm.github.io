<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | RatIBro</title>
  <link rel="icon" type="image/png" href="ratibroicon2sm.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-shell">
  <div id="sidebar-container"></div>

  <main class="main-content">
    <div class="page-header">
      <div class="page-title" id="greeting">Skills Dashboard</div>
      <div class="page-subtitle">Rate yourself on each topic. Your history is tracked over time.</div>
    </div>
    <div class="stats-row" id="stats-row"></div>
    <div id="units-container"></div>
  </main>
</div>

<!-- ── Inline practice modal ── -->
<div id="pm-overlay" class="pm-overlay hidden" onclick="if(event.target===this)closePracticeModal()">
  <div class="pm-box">
    <button class="pm-close" onclick="closePracticeModal()">&times;</button>

    <!-- Setup screen -->
    <div id="pm-setup">
      <div class="pm-header">
        <span class="pm-badge" id="pm-badge">Definitions</span>
        <h3 id="pm-cluster-title"></h3>
      </div>
      <!-- Defs/calc count picker -->
      <div id="pm-count-section">
        <div class="count-label">Ask me this many:</div>
        <div class="count-picker" id="pm-count-picker"></div>
      </div>
      <!-- Calc mode picker -->
      <div id="pm-calc-mode-section" class="hidden">
        <div class="count-label">Mode:</div>
        <div class="pm-mode-btns">
          <button class="pm-mode-btn selected" id="pm-calc-just" onclick="pmSetCalcMode(false)">Just the numbers</button>
          <button class="pm-mode-btn" id="pm-calc-hunt" onclick="pmSetCalcMode(true)">Make me hunt</button>
        </div>
      </div>
      <!-- Stmt mode picker -->
      <div id="pm-stmt-section" class="hidden">
        <div class="count-label">Choose mode:</div>
        <div class="pm-mode-btns">
          <button class="pm-mode-btn selected" id="pm-mode-fill" onclick="pmSetStmtMode('fill')">Fill in blanks</button>
          <button class="pm-mode-btn" id="pm-mode-figures" onclick="pmSetStmtMode('figures')">Just the numbers</button>
          <button class="pm-mode-btn" id="pm-mode-hunt" onclick="pmSetStmtMode('hunt')">Make me hunt</button>
        </div>
      </div>
      <button class="btn-primary" onclick="startPMSession()">Start</button>
    </div>

    <!-- Session screen -->
    <div id="pm-session" class="hidden">
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="pm-progress-fill" style="width:0%"></div>
      </div>
      <div id="pm-card"></div>
      <div class="def-actions" id="pm-actions">
        <button class="btn-secondary" onclick="pmSkip()">Skip</button>
        <button class="btn-secondary btn-reveal" id="pm-reveal-btn" onclick="pmReveal()">Reveal answer</button>
      </div>
      <div class="rating-panel" id="pm-rating">
        <div class="rating-panel-q">How well did you do?</div>
        <div class="rating-options">
          <button class="rating-option" data-r="1" onclick="pmRate(1)"><span class="rating-emoji">😬</span>Don't know it</button>
          <button class="rating-option" data-r="2" onclick="pmRate(2)"><span class="rating-emoji">🤔</span>Shaky</button>
          <button class="rating-option" data-r="3" onclick="pmRate(3)"><span class="rating-emoji">😊</span>Getting there</button>
          <button class="rating-option" data-r="4" onclick="pmRate(4)"><span class="rating-emoji">🎉</span>Got it</button>
        </div>
      </div>
    </div>

    <!-- Done screen -->
    <div id="pm-done" class="hidden">
      <div class="session-summary">
        <div class="summary-title">Done!</div>
        <div class="summary-sub" id="pm-done-sub"></div>
        <button class="btn-primary" style="width:auto;padding:12px 28px" onclick="closePracticeModal()">Close</button>
      </div>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script src="js/data.js"></script>
<script type="module">
  import { onAuthChange, logoutUser, getDisplayName, isTeacher, ensureUserDoc, getProgress, recordAttempt } from './js/firebase.js';

  initTheme();

  let currentUser = null;
  let progressCache = {};

  onAuthChange(async user => {
    if (!user) { window.location.replace('index.html'); return; }
    currentUser = user;
    await ensureUserDoc(user);

    // Build sidebar
    document.getElementById('sidebar-container').innerHTML =
      buildSidebar('dashboard', getDisplayName(user), isTeacher(user));
    updateThemeToggle();
    document.getElementById('logout-btn').addEventListener('click', logoutUser);

    // Greeting
    const hour = new Date().getHours();
    const tod = hour < 12 ? 'Morning' : hour < 17 ? 'Afternoon' : 'Evening';
    document.getElementById('greeting').textContent = `Good ${tod}, ${getDisplayName(user)}`;

    // Load progress then render
    progressCache = await getProgress(user.uid);
    renderStats();
    renderUnits();
  });

  function getLocal(skillId) {
    return progressCache[skillId] || { ratings: [], attempts: 0 };
  }

  function earnedRating(p) {
    // Last non-self-report rating, or null
    return [...p.ratings].reverse().find(r => !r.selfReport)?.rating || null;
  }

  function renderStats() {
    const total = ALL_SKILLS.length;
    let rated = 0, totalAttempts = 0, greens = 0;
    ALL_SKILLS.forEach(s => {
      const p = getLocal(s.id);
      const earned = earnedRating(p);
      if (earned !== null) {
        rated++;
        if (earned === 4) greens++;
      }
      totalAttempts += p.attempts;
    });
    document.getElementById('stats-row').innerHTML = `
      <div class="stat-card">
        <div class="stat-value">${rated}/${total}</div>
        <div class="stat-label">Topics rated</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${totalAttempts}</div>
        <div class="stat-label">Practice attempts</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" style="color:var(--rate-green)">${greens}</div>
        <div class="stat-label">Topics in the green</div>
      </div>
    `;
  }

  function renderUnits() {
    document.getElementById('units-container').innerHTML = TOPICS.map(unit => {
      const totalSkills = unit.clusters.reduce((n, c) => n + c.skills.length, 0);

      const clusterHTML = unit.clusters.map(cluster => {
        // Mini status dots — one per skill, coloured by earned (non-self-report) rating only
        const dots = cluster.skills.map(skill => {
          const p = getLocal(skill.id);
          const earned = earnedRating(p);
          const attr = earned ? `data-r="${earned}"` : '';
          return `<span class="cluster-dot" data-skill-id="${skill.id}" ${attr}></span>`;
        }).join('');

        // Skill sub-rows
        const skillRows = cluster.skills.map(skill => {
          const p = getLocal(skill.id);
          const earned = earnedRating(p);
          const lastEntry = p.ratings[p.ratings.length - 1];
          const selfRep = lastEntry?.selfReport ? lastEntry.rating : null;

          const ratingBtns = [1,2,3,4].map(r => {
            const isEarned = earned === r;
            const isSelf   = selfRep === r && selfRep !== earned;
            return `<button class="rating-btn${isEarned ? ' selected' : ''}${isSelf ? ' self-reported' : ''}" data-r="${r}"
              title="${RATING_MEANINGS[r]}"
              onclick="rateSkill('${skill.id}', ${r}, this)">
            </button>`;
          }).join('');

          // History dots from earned attempts only
          const earnedOnly = p.ratings.filter(r => !r.selfReport);
          const recentDots = earnedOnly.slice(-8);
          const dotOffset = Math.max(0, earnedOnly.length - 8);
          const historyDots = recentDots.length
            ? recentDots.map((e, i) => {
                const hasDetail = e.q ? `data-has-detail data-sid="${skill.id}" data-idx="${dotOffset + i}"` : '';
                return `<span class="history-dot" data-r="${e.rating}" title="${RATING_MEANINGS[e.rating]}" ${hasDetail} onclick="showDotDetail('${skill.id}', ${dotOffset + i})"></span>`;
              }).join('')
            : '<span style="color:var(--text-muted);font-size:0.72rem;font-weight:600;">No attempts yet</span>';

          return `
            <div class="skill-subrow" id="row-${skill.id}">
              <div class="topic-name">
                ${skill.name}${skill.hl ? '<span class="hl-tag">HL</span>' : ''}
              </div>
              <div class="history-dots">${historyDots}</div>
              <div class="rating-btns">${ratingBtns}</div>
              <div class="attempt-count">${p.attempts > 0 ? p.attempts + '×' : '-'}</div>
            </div>`;
        }).join('');

        const clusterCalcKeys = CLUSTER_CALCS[cluster.id] || [];
        const clusterStmtType = CLUSTER_STMTS[cluster.id] || '';
        const cname = cluster.name.replace(/"/g, '&quot;');
        const practiceBtns = `<span class="cluster-practice-btns" onclick="event.stopPropagation()">
          <button class="cpb2 cpb2-defs" data-cid="${cluster.id}" data-cname="${cname}" data-ptype="defs" onclick="openPracticeModalBtn(this)">▸ Defs</button>
          ${clusterCalcKeys.length ? `<button class="cpb2 cpb2-calc" data-cid="${cluster.id}" data-cname="${cname}" data-ptype="calc" onclick="openPracticeModalBtn(this)">▸ Calc</button>` : ''}
          ${clusterStmtType ? `<button class="cpb2 cpb2-stmt" onclick="openStatementsFor('${clusterStmtType}', '${cname}')">▸ Stmts</button>` : ''}
        </span>`;

        return `
          <div class="cluster-section collapsed" id="cluster-${cluster.id}">
            <div class="cluster-row" onclick="toggleCluster('${cluster.id}')">
              <span class="cluster-name">${cluster.name}</span>
              ${practiceBtns}
              <span class="cluster-indicators">${dots}</span>
              <span class="cluster-chevron">▼</span>
            </div>
            <div class="cluster-skills">${skillRows}</div>
          </div>`;
      }).join('');

      return `
        <div class="unit-section" id="unit-${unit.unit.replace('.', '-')}">
          <div class="unit-header" onclick="toggleUnit('${unit.unit}')">
            <span class="unit-badge">${unit.unit}</span>
            <span class="unit-name">${unit.unitName}</span>
            <span class="unit-count">${totalSkills} topics</span>
            <span class="unit-chevron">▼</span>
          </div>
          <div class="unit-topics">${clusterHTML}</div>
        </div>`;
    }).join('');
  }

  window.toggleUnit = function(unitId) {
    document.getElementById('unit-' + unitId.replace('.', '-')).classList.toggle('collapsed');
  };

  window.toggleCluster = function(clusterId) {
    document.getElementById('cluster-' + clusterId).classList.toggle('collapsed');
  };

  function updateRowButtons(skillId, row) {
    const p = progressCache[skillId] || { ratings: [], attempts: 0 };
    const earned = earnedRating(p);
    const lastEntry = p.ratings[p.ratings.length - 1];
    const selfRep = lastEntry?.selfReport ? lastEntry.rating : null;
    row.querySelectorAll('.rating-btn').forEach(b => {
      const r = parseInt(b.dataset.r);
      b.classList.toggle('selected', earned === r);
      b.classList.toggle('self-reported', selfRep === r && selfRep !== earned);
    });
    // Update cluster header dot (earned only)
    const clusterDot = document.querySelector(`.cluster-dot[data-skill-id="${skillId}"]`);
    if (clusterDot) {
      if (earned) clusterDot.dataset.r = earned;
      else delete clusterDot.dataset.r;
    }
  }

  window.rateSkill = async function(skillId, rating, btn) {
    if (!currentUser) return;
    if (!progressCache[skillId]) progressCache[skillId] = { ratings: [], attempts: 0 };
    const p = progressCache[skillId];

    const lastEntry = p.ratings[p.ratings.length - 1];
    const activeSelfRep = lastEntry?.selfReport ? lastEntry : null;

    if (activeSelfRep && activeSelfRep.rating === rating) {
      // Clicking the same hollow button — remove self-report
      p.ratings.splice(p.ratings.length - 1, 1);
      updateRowButtons(skillId, btn.closest('.skill-subrow'));
      renderStats();
      showToast('Self report removed');
      try { await recordAttempt(currentUser.uid, skillId, 0, { removeSelfReport: true }); } catch(e) {}
      return;
    }

    // Replace any existing self-report then add new one
    if (activeSelfRep) p.ratings.splice(p.ratings.length - 1, 1);
    p.ratings.push({ rating, timestamp: Date.now(), selfReport: true });

    // No dot, no attempt count, no cluster dot change
    updateRowButtons(skillId, btn.closest('.skill-subrow'));
    renderStats();
    showToast(`Self-rated: ${RATING_MEANINGS[rating]}`);

    try {
      await recordAttempt(currentUser.uid, skillId, rating, { selfReport: true });
    } catch(e) { console.error('recordAttempt failed:', e); }
  };

  // ── Cluster practice config ──
  const CLUSTER_CALCS = {
    'profitability-ratios': ['gross-profit-margin', 'profit-margin', 'roce'],
    'liquidity-ratios':     ['current-ratio', 'acid-test'],
    'efficiency-ratios':    ['stock-turnover-times', 'stock-turnover-days', 'debtor-days', 'creditor-days'],
    'gearing-solvency':     ['gearing'],
    'investment-appraisal': ['arr'],
  };
  const CLUSTER_STMTS = {
    'financial-statements': 'pl',
    'assets-depreciation':  'sfp',
    'cashflow-concepts':    'cashflow',
    'cashflow-management':  'cashflow',
    'budgets':              'budget',
  };
  const PM_SKILL_MAP = {
    'gross-profit-margin': 'gross-profit-margin', 'profit-margin': 'profit-margin',
    'roce': 'roce', 'current-ratio': 'current-ratio', 'acid-test': 'acid-test-ratio',
    'arr': 'arr', 'stock-turnover-times': 'stock-turnover', 'stock-turnover-days': 'stock-turnover',
    'debtor-days': 'debtor-days', 'creditor-days': 'creditor-days', 'gearing': 'gearing-ratio',
  };

  // ── Modal state ──
  let pmType          = 'defs';
  let pmClusterId     = '';
  let pmStmtType      = '';
  let pmStmtMode      = 'fill';
  let pmCalcHuntMode  = false;
  let pmItems         = [];
  let pmIndex         = 0;
  let pmCount         = 5;
  let pmResults       = [];

  window.openPracticeModalBtn = function(btn) {
    openPracticeModal(btn.dataset.cid, btn.dataset.cname, btn.dataset.ptype);
  };

  function openPracticeModal(clusterId, clusterName, type, stmtType) {
    pmType      = type;
    pmClusterId = clusterId;

    document.getElementById('pm-cluster-title').textContent = clusterName;

    const isStmt = type === 'stmt';
    const isCalc = type === 'calc';
    document.getElementById('pm-count-section').classList.toggle('hidden', isStmt);
    document.getElementById('pm-stmt-section').classList.toggle('hidden', !isStmt);
    document.getElementById('pm-calc-mode-section').classList.toggle('hidden', !isCalc);
    document.getElementById('pm-badge').textContent = isStmt ? 'Statements' : (type === 'defs' ? 'Definitions' : 'Calculations');
    document.getElementById('pm-badge').className = 'pm-badge pm-badge-' + type;

    if (isStmt) {
      pmStmtType = stmtType || '';
      pmStmtMode = 'fill';
      ['fill','figures','hunt'].forEach(m => {
        document.getElementById('pm-mode-' + m).classList.toggle('selected', m === 'fill');
      });
    } else {
      if (isCalc) {
        pmCalcHuntMode = false;
        document.getElementById('pm-calc-just').classList.add('selected');
        document.getElementById('pm-calc-hunt').classList.remove('selected');
      }
      const available = type === 'defs'
        ? ALL_SKILLS.filter(s => s.clusterId === clusterId)
        : (CLUSTER_CALCS[clusterId] || []);
      if (!available.length) return;
      const total = available.length;
      const opts = [3, 5, 10].filter(n => n < total);
      if (!opts.length || opts[opts.length - 1] !== total) opts.push(total);
      pmCount = opts[0] <= 5 ? (opts.find(n => n <= 5) || opts[0]) : opts[0];
      document.getElementById('pm-count-picker').innerHTML = opts.map(n =>
        `<button class="count-btn${n === pmCount ? ' selected' : ''}" onclick="pmSelectCount(${n},this)">${n}</button>`
      ).join('');
    }

    // Show setup
    document.getElementById('pm-setup').classList.remove('hidden');
    document.getElementById('pm-session').classList.add('hidden');
    document.getElementById('pm-done').classList.add('hidden');
    document.getElementById('pm-overlay').classList.remove('hidden');
  }

  window.pmSetStmtMode = function(mode) {
    pmStmtMode = mode;
    ['fill','figures','hunt'].forEach(m => {
      document.getElementById('pm-mode-' + m).classList.toggle('selected', m === mode);
    });
  };

  window.pmSetCalcMode = function(hunt) {
    pmCalcHuntMode = hunt;
    document.getElementById('pm-calc-just').classList.toggle('selected', !hunt);
    document.getElementById('pm-calc-hunt').classList.toggle('selected', hunt);
  };

  window.pmSelectCount = function(n, btn) {
    pmCount = n;
    document.querySelectorAll('#pm-count-picker .count-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
  };

  window.startPMSession = function() {
    if (pmType === 'stmt') {
      const modeParam = pmStmtMode === 'hunt' ? 'figures&hunt=1' : pmStmtMode;
      window.location.href = `statements.html?type=${pmStmtType}&mode=${modeParam}`;
      return;
    }
    pmIndex = 0; pmResults = [];
    if (pmType === 'defs') {
      const skills = ALL_SKILLS.filter(s => s.clusterId === pmClusterId);
      pmItems = [...skills].sort(() => Math.random() - 0.5).slice(0, pmCount);
    } else {
      const keys = [...(CLUSTER_CALCS[pmClusterId] || [])].sort(() => Math.random() - 0.5).slice(0, pmCount);
      pmItems = keys.map(k => generateCalcQuestion(k));
    }
    document.getElementById('pm-setup').classList.add('hidden');
    document.getElementById('pm-session').classList.remove('hidden');
    pmLoadQuestion();
  };

  const UNIT_EG = { '%': '42.5%', ':1': '1.5:1', ' days': '45 days', ' times': '3.2 times' };
  function pmFmt(n) { return Number.isInteger(n) ? n.toLocaleString() : n.toLocaleString(undefined, { maximumFractionDigits: 2 }); }

  function pmLoadQuestion() {
    const item = pmItems[pmIndex];
    document.getElementById('pm-progress-fill').style.width = (pmIndex / pmItems.length * 100) + '%';
    document.getElementById('pm-rating').classList.remove('visible');
    document.getElementById('pm-actions').style.display = '';
    document.getElementById('pm-reveal-btn').disabled = false;
    document.getElementById('pm-reveal-btn').textContent = 'Reveal answer';

    const card = document.getElementById('pm-card');
    if (pmType === 'defs') {
      card.innerHTML = `<div class="def-card">
        <div class="def-card-meta"><span class="def-card-unit">${item.unit} ${item.unitName}</span></div>
        <div class="def-term">${item.name}${item.hl ? '<span class="hl-tag">HL</span>' : ''}</div>
        <textarea class="def-input" id="pm-def-input" placeholder="Write your definition here..."></textarea>
        <div class="def-answer hidden" id="pm-def-answer">
          <div class="def-answer-label">Definition</div>
          <div class="def-answer-text">${item.definition}</div>
        </div>
      </div>`;
    } else {
      const q = item;
      let displayEntries = q.formula.inputs.map(k => [k, q.values[k]]);
      if (pmCalcHuntMode) {
        const decoys = generateDecoys(q);
        displayEntries = [...displayEntries, ...Object.entries(decoys)].sort(() => Math.random() - 0.5);
      }
      const rows = displayEntries.map(([k, v]) => {
        const display = k === 'yearsOfUse' ? pmFmt(v) + ' years' : '$' + pmFmt(v);
        return `<div class="calc-input-row"><div class="calc-input-label">${INPUT_LABELS[k]}</div><div class="calc-input-value">${display}</div></div>`;
      }).join('');
      card.innerHTML = `<div class="calc-question-card">
        <div class="calc-formula-name">${q.formula.name}</div>
        <div class="calc-inputs">${rows}</div>
        <div class="calc-answer-input-wrap">
          <span class="calc-answer-label">Your answer:</span>
          <input type="text" class="calc-answer-input" id="pm-calc-input"
            placeholder="${UNIT_EG[q.formula.unit] || '?'}" autocomplete="off" inputmode="decimal">
        </div>
        <div class="calc-check-result hidden" id="pm-check-result"></div>
        <div class="calc-correct-answer hidden" id="pm-correct-answer">
          <div class="calc-correct-label">Correct answer</div>
          <div class="calc-correct-value">${pmFmt(Math.round(q.answer * 100) / 100)}${q.formula.unit}</div>
        </div>
      </div>`;
    }
    // Focus textarea for defs
    if (pmType === 'defs') setTimeout(() => document.getElementById('pm-def-input')?.focus(), 50);
  }

  window.pmReveal = function() {
    document.getElementById('pm-reveal-btn').disabled = true;
    if (pmType === 'defs') {
      const ans = document.getElementById('pm-def-answer');
      ans.classList.remove('hidden');
      ans.classList.add('visible');
    } else {
      const q = pmItems[pmIndex];
      const raw = (document.getElementById('pm-calc-input')?.value || '').trim();
      const checkEl = document.getElementById('pm-check-result');
      checkEl.classList.remove('hidden');
      if (raw) {
        const res = pmCheckAnswer(raw, q);
        if (res === 'correct')  { checkEl.className = 'calc-check-result check-correct'; checkEl.textContent = '✓ Correct!'; }
        else if (res === 'wrong')  { checkEl.className = 'calc-check-result check-wrong';   checkEl.textContent = '✗ Not quite - see correct answer below'; }
        else { checkEl.className = 'calc-check-result check-no-unit'; checkEl.innerHTML = `Include the unit, e.g. <strong>${UNIT_EG[q.formula.unit]}</strong>`; }
      }
      const ca = document.getElementById('pm-correct-answer');
      ca.classList.remove('hidden');
      ca.classList.add('visible');
    }
    document.getElementById('pm-actions').style.display = 'none';
    document.getElementById('pm-rating').classList.add('visible');
  };

  function pmCheckAnswer(raw, q) {
    const unit = q.formula.unit, lower = raw.toLowerCase().replace(/\s+/g,'');
    let hasUnit = false, numStr = raw;
    if (unit === '%')      { hasUnit = lower.endsWith('%');     numStr = raw.replace(/%/g,'').trim(); }
    else if (unit === ':1'){ hasUnit = lower.includes(':1');    numStr = raw.replace(/:1/gi,'').trim(); }
    else if (unit === ' days') { hasUnit = lower.endsWith('days');  numStr = raw.toLowerCase().replace('days','').trim(); }
    else if (unit === ' times'){ hasUnit = lower.endsWith('times'); numStr = raw.toLowerCase().replace('times','').trim(); }
    if (!hasUnit) return 'no-unit';
    const s = parseFloat(numStr);
    if (isNaN(s)) return 'no-unit';
    return Math.round(s * 100) === Math.round(q.answer * 100) ? 'correct' : 'wrong';
  }

  window.pmSkip = function() { pmResults.push({}); pmAdvance(); };

  window.pmRate = async function(rating) {
    document.getElementById('pm-rating').classList.remove('visible');
    const item = pmItems[pmIndex];
    if (pmType === 'defs') {
      const s = document.getElementById('pm-def-input')?.value?.trim() || '';
      try {
        if (currentUser) await recordAttempt(currentUser.uid, item.id, rating, { q: item.name, s, a: item.definition });
      } catch(e) { console.warn(e); }
      if (!progressCache[item.id]) progressCache[item.id] = { ratings: [], attempts: 0 };
      progressCache[item.id].ratings.push({ rating, timestamp: Date.now(), q: item.name, s, a: item.definition });
      progressCache[item.id].attempts++;
    } else {
      const q = item;
      const skillId = PM_SKILL_MAP[q.formulaKey];
      const s = document.getElementById('pm-calc-input')?.value?.trim() || '';
      const a = pmFmt(Math.round(q.answer * 100) / 100) + q.formula.unit;
      try {
        if (skillId && currentUser) await recordAttempt(currentUser.uid, skillId, rating, { q: q.formula.name, s, a });
      } catch(e) { console.warn(e); }
      if (skillId) {
        if (!progressCache[skillId]) progressCache[skillId] = { ratings: [], attempts: 0 };
        progressCache[skillId].ratings.push({ rating, timestamp: Date.now(), q: q.formula.name, s, a });
        progressCache[skillId].attempts++;
      }
    }
    pmResults.push({ rating });
    pmAdvance();
  };

  function pmAdvance() {
    pmIndex++;
    if (pmIndex >= pmItems.length) {
      renderStats();
      renderUnits();
      document.getElementById('pm-session').classList.add('hidden');
      document.getElementById('pm-done').classList.remove('hidden');
      const done = pmResults.filter(r => r.rating).length;
      document.getElementById('pm-done-sub').textContent =
        `You completed ${done} out of ${pmItems.length} ${pmType === 'defs' ? 'definitions' : 'calculations'}.`;
    } else {
      pmLoadQuestion();
    }
  }

  window.closePracticeModal = function() {
    document.getElementById('pm-overlay').classList.add('hidden');
  };

  window.openStatementsFor = function(stmtType, clusterName) {
    openPracticeModal('', clusterName || 'Statements', 'stmt', stmtType);
  };

  window.showDotDetail = function(skillId, idx) {
    const p = progressCache[skillId];
    const entry = p && p.ratings[idx];
    if (!entry || !entry.q) {
      showHelp(`<h3>No details stored</h3><p style="color:var(--text-muted);font-size:0.875rem;line-height:1.5;">This attempt was recorded before detailed tracking was added. Practice again and it will show here.</p>`);
      return;
    }
    const studentAns = entry.s ? entry.s : '<em style="color:var(--text-muted)">nothing written</em>';
    showHelp(`
      <h3>${entry.q}</h3>
      <div class="help-item"><strong>Your answer</strong><span>${studentAns}</span></div>
      <div class="help-item"><strong>Correct answer</strong><span>${entry.a || ''}</span></div>
    `);
  };
</script>
</body>
</html>
